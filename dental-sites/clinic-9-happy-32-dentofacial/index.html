    function Hero(){const msg=`Hi, I have a dentofacial/dental question for ${CLINIC_NAME}.\n\nMy concern:\nPain or swelling:\nPrevious X-ray/report available:\nPreferred response time:\nName:`;return <section className="hero" id="hero"><div className="hero-bg-window"><div className="hero-bg-track">{mediaSlides.map(([label,url])=><div className="hero-bg-slide" style={{backgroundImage:`url(${url})`}} aria-label={label} key={label}/>)}</div></div><div className="container hero-grid"><div className="hero-copy"><div className="hero-kicker">Premium dentofacial clinic in Indore</div><h1>5.0 rated dentofacial questions answered before you visit</h1><p>Happy 32 Dentofacial Clinic is listed with a perfect 5.0 score. Ask about pain, swelling, facial dental concerns, reports, or appointment timing before travelling.</p><div className="hero-actions"><a href={waFor(msg)} target="_blank" rel="noopener" className="btn btn-wa"><i className="fab fa-whatsapp"/> WhatsApp a Question</a><a href="#appointment" className="btn btn-primary"><i className="fas fa-calendar-check"/> Book an Appointment</a><a href={TEL} className="btn btn-light"><i className="fas fa-phone"/> Call Clinic</a></div></div><div className="hero-panel"><h3>Why this clinic stands out</h3><div className="hero-panel-row"><i className="fas fa-star"/><span>5.0 rating from 115 reviews.</span></div><div className="hero-panel-row"><i className="fas fa-user-doctor"/><span>{DOCTOR_NAME} is listed with Happy 32 Dentofacial Clinic.</span></div><div className="hero-panel-row"><i className="fas fa-notes-medical"/><span>Surgery-specific details were not provided, so the page invites consultation questions first.</span></div><a href="#appointment" className="btn btn-primary" style={{width:"100%",marginTop:10}}>Plan Consultation</a></div></div></section>}
    function QuickCards(){return <section className="quick-cards"><div className="container quick-grid">{quickCards.map(([icon,title,copy])=><div className="quick-card reveal" key={title}><i className={`fas ${icon}`}/><h3>{title}</h3><p>{copy}</p></div>)}</div></section>}
    function About(){return <section className="section" id="about"><div className="container about-grid"><div className="social-showcase reveal"><div className="social-phone"><div className="social-screen"><div className="social-top"><div className="social-handle"><span className="social-avatar"><i className="fab fa-instagram"/></span><span>@happy_32dental</span></div><span className="social-badge">Social</span></div><div className="social-photo" role="img" aria-label="Happy 32 Dentofacial Clinic social preview"/><div className="social-stats"><div className="social-stat"><strong>5.0</strong><span>Rating</span></div><div className="social-stat"><strong>115</strong><span>Reviews</span></div><div className="social-stat"><strong>H32</strong><span>Clinic</span></div></div><div className="social-actions"><a className="social-link insta" href={INSTAGRAM_URL} target="_blank" rel="noopener"><i className="fab fa-instagram"/> Instagram</a><a className="social-link fb" href={FACEBOOK_URL} target="_blank" rel="noopener"><i className="fab fa-facebook-f"/> Facebook</a></div></div></div><p className="social-note">Follow the clinic's social pages for a quick look at its public presence before booking.</p></div><div className="contact-card reveal"><div className="eyebrow">About the clinic</div><h2 className="section-title">Premium positioning with a social-first clinic presence</h2><p className="section-copy">{DOCTOR_NAME} is listed with Happy 32 Dentofacial Clinic. This page keeps the copy focused on dentofacial consultation, pain questions, report discussion, and clear visit planning while giving mobile visitors quick access to the clinic's Instagram and Facebook pages.</p></div></div></section>}
    function Services(){return <section className="section section-soft" id="services"><div className="container"><div className="eyebrow">Services</div><h2 className="section-title">Dentofacial and everyday dental questions</h2><p className="section-copy">The service cards guide patients toward questions, urgent calls, or appointment requests without adding unsupported surgical details.</p><div className="services-grid">{services.map(([icon,title,copy])=><div className="service-card reveal" key={title}><i className={`fas ${icon}`}/><h3>{title}</h3><p>{copy}</p></div>)}</div></div></section>}
    function ToothServices(){const left=services.slice(0,3),right=services.slice(3);const Point=({item})=>{const[icon,title,copy]=item;return <div className="tooth-point"><div className="tooth-copy"><h3>{title}</h3><p>{copy}</p></div><div className="tooth-icon"><i className={`fas ${icon}`}/></div></div>};return <section className="section tooth-services" id="tooth-services"><div className="container"><div className="eyebrow">Services explained</div><h2 className="section-title">Every consultation starts with knowing which dental or facial concern we are solving</h2><p className="section-copy">The premium service map keeps dentofacial, urgent, preventive, and family dental concerns visible without repeating photo cards.</p><div className="tooth-map"><div className="tooth-column left">{left.map(item=><Point item={item} key={item[1]}/>)}</div><div className="tooth-center"><div className="tooth-orbit"><i className="fas fa-tooth big-tooth"/><span className="tooth-dot dot-1"/><span className="tooth-dot dot-2"/><span className="tooth-dot dot-3"/><span className="tooth-dot dot-4"/><span className="tooth-dot dot-5"/><span className="tooth-dot dot-6"/><span className="tooth-root"/></div></div><div className="tooth-column right">{right.map(item=><Point item={item} key={item[1]}/>)}</div></div></div></section>}
    function Why(){return <section className="section" id="why"><div className="container"><div className="eyebrow">Why choose this clinic</div><h2 className="section-title">Specialist-style clarity with easy next steps</h2><div className="why-grid">{why.map(([icon,title,copy])=><div className="why-card reveal" key={title}><i className={`fas ${icon}`}/><h3>{title}</h3><p>{copy}</p></div>)}</div></div></section>}
    function Gallery(){return <section className="section section-soft" id="gallery"><div className="container"><div className="eyebrow">Clinic experience</div><h2 className="section-title">Polished visuals without unsupported gallery claims</h2><p className="section-copy">Verified clinic interior photos were not provided, so this page uses modest dental consultation visuals and links visitors to the clinic's social profiles for current posts.</p><div className="gallery-grid">{gallery.map(([label,url])=><div className="gallery-item reveal" style={{backgroundImage:`url(${url})`}} key={label}><span>{label}</span></div>)}</div></div></section>}
    function Testimonials(){return <section className="section" id="testimonials"><div className="container"><div className="eyebrow">Patient signals</div><h2 className="section-title">Review proof without invented reviewer names</h2><div className="test-grid">{reviews.map(([text,label])=><div className="testimonial reveal" key={label}><div className="stars"><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/></div><p>{text}</p><strong>{label}</strong></div>)}</div></div></section>}
    function Appointment(){const today=new Date().toISOString().slice(0,10);const[name,setName]=useState(""),[date,setDate]=useState(today),[slot,setSlot]=useState("6:30 PM"),[service,setService]=useState("Dentofacial consultation"),[note,setNote]=useState("");const message=`Hi, I want to request an appointment at ${CLINIC_NAME}.\n\nName: ${name || ""}\nPreferred date: ${date}\nPreferred slot: ${slot}\nConcern: ${service}\nDetails: ${note || ""}\n\nPlease share the next steps for my visit.`;return <section className="section appointment" id="appointment"><div className="container appointment-grid"><div><div className="eyebrow" style={{color:"#d6eef4"}}>Book appointment</div><h2 className="section-title">Pick a time and send the request</h2><p className="section-copy">Select a date, time, and concern. The planner creates a ready WhatsApp appointment request.</p></div><div className="form-panel reveal"><input className="field" value={name} onChange={e=>setName(e.target.value)} placeholder="Patient name"/><input className="field" type="date" min={today} value={date} onChange={e=>setDate(e.target.value)}/><div className="slots">{["10:30 AM","1:00 PM","6:30 PM"].map(item=><button className={`slot ${slot===item?"active":""}`} type="button" onClick={()=>setSlot(item)} key={item}>{item}</button>)}</div><select className="field" value={service} onChange={e=>setService(e.target.value)}><option>Dentofacial consultation</option><option>Pain or swelling question</option><option>X-ray or report discussion</option><option>Dental checkup</option><option>Cleaning and gum care</option><option>Family dental visit</option></select><textarea className="field notes" value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional details"/><div className="message-preview">{message.split("\n").map((line,i)=><React.Fragment key={i}>{line}<br/></React.Fragment>)}</div><a className="btn btn-wa appointment-send" href={waFor(message)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Send Appointment Request</a></div></div></section>}
    function Contact(){return <section className="section" id="contact"><div className="container contact-grid"><div className="contact-card reveal"><div className="eyebrow">Contact</div><h2 className="section-title">Visit {CLINIC_NAME}</h2><p className="section-copy">Call for urgent pain, swelling, or same-day guidance. Instagram and Facebook are included as verified social links provided for this clinic.</p><div className="contact-row"><i className="fas fa-location-dot"/><div><strong>{ADDRESS}</strong><span>Address included for local patients and map searches.</span></div></div><div className="contact-row"><i className="fas fa-phone"/><div><strong><a href={TEL}>{PHONE}</a></strong><span>Call for urgent pain, swelling, or immediate concerns.</span></div></div><div className="contact-row"><i className="fab fa-whatsapp"/><div><strong><a href={waFor(`Hi, I want to contact ${CLINIC_NAME}.`)} target="_blank" rel="noopener">WhatsApp 8889562200</a></strong><span>Best for simple patient questions and appointment requests.</span></div></div><div className="contact-row"><i className="fab fa-instagram"/><div><strong><a href={INSTAGRAM_URL} target="_blank" rel="noopener">Instagram @happy_32dental</a></strong><span>Open the clinic's Instagram profile.</span></div></div><div className="contact-row"><i className="fab fa-facebook-f"/><div><strong><a href={FACEBOOK_URL} target="_blank" rel="noopener">Facebook page</a></strong><span>Open the clinic's Facebook profile.</span></div></div><div className="contact-row"><i className="fas fa-star"/><div><strong>5.0 rating from 115 reviews</strong><span>Public proof used as the premium positioning signal.</span></div></div></div><div className="map-wrap reveal"><iframe src="https://maps.google.com/maps?q=Happy%2032%20Dentofacial%20Clinic%20328%20Guru%20Niwas%20Khatiwala%20Tank%20Indore&output=embed" title="Happy 32 Dentofacial Clinic location map" loading="lazy" allowFullScreen /></div></div></section>}
    function StickyActions(){const msg=`Hi, I have a dental question for ${CLINIC_NAME}.`;return <><div className="sticky"><a href={waFor(msg)} className="sticky-wa" target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> WhatsApp</a><a href={TEL} className="sticky-call"><i className="fas fa-phone"/> Call Clinic</a></div><a className="wa-bubble" href={waFor(msg)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Ask on WhatsApp</a></>}
    function App(){useEffect(()=>{const targets=document.querySelectorAll(".section,.quick-card,.service-card,.why-card,.gallery-item,.testimonial,.contact-card,.map-wrap,.form-panel,.social-showcase");const io=new IntersectionObserver(entries=>entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add("in-view");io.unobserve(entry.target)}}),{threshold:.12});targets.forEach(el=>io.observe(el));return()=>io.disconnect()},[]);return <><Header/><main><Hero/><QuickCards/><About/><Services/><ToothServices/><Why/><Gallery/><Testimonials/><Appointment/><Contact/></main><footer className="footer"><div className="container"><h3>{CLINIC_NAME}</h3><p>{ADDRESS}</p></div></footer><StickyActions/></>}
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
