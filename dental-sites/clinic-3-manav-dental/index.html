  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" integrity="sha384-KCD0A3BqTNZfWlXJcL7fKzDri97vicyNr4NUIr0vX6K9PZ0X5hOTeEbFh99jPEST" crossorigin="anonymous"></script>
  <style>
    :root{--primary:#2D6A4F;--accent:#F4A261;--bg:#fbfaf6;--soft:#E8F5EF;--text:#1d241f;--muted:#617067;--white:#fff;--gold:#E8B84B;--wa:#25D366}
    *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--text);line-height:1.65}@media(max-width:768px){body{padding-bottom:62px}}.container{max-width:1180px;margin:0 auto;padding:0 24px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;min-height:48px;padding:12px 22px;border-radius:8px;border:0;text-decoration:none;font-weight:700;font-size:15px;cursor:pointer;transition:.2s}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(45,106,79,.22)}.btn-outline{background:#fff;color:var(--primary);border:2px solid rgba(45,106,79,.35)}.sec-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:700;color:var(--primary);margin-bottom:10px}.sec-title{font-family:Lora,serif;font-size:clamp(28px,4vw,44px);line-height:1.15;margin-bottom:14px}.accent-rule{width:48px;height:3px;background:var(--accent);border-radius:8px;margin:0 0 34px}.section{padding:82px 0}.site-header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);border-bottom:1px solid rgba(45,106,79,.12);box-shadow:0 2px 18px rgba(45,106,79,.06)}.header-inner{height:64px;display:flex;align-items:center;justify-content:space-between}.logo{text-decoration:none}.logo-name{display:block;font-family:Lora,serif;font-size:18px;font-weight:700;color:var(--primary);line-height:1.1}.logo-sub{font-size:10px;text-transform:uppercase;letter-spacing:1.6px;color:var(--muted)}.desktop-nav{display:none;align-items:center;gap:25px}.desktop-nav a{text-decoration:none;color:var(--text);font-size:14px;font-weight:600}.nav-book{background:var(--primary)!important;color:#fff!important;border-radius:8px;padding:8px 16px}.hamburger{display:flex;flex-direction:column;gap:5px;background:none;border:0;padding:8px}.hamburger span{width:23px;height:2px;background:var(--primary);border-radius:2px}@media(min-width:820px){.desktop-nav{display:flex}.hamburger{display:none}}.mobile-menu{position:fixed;top:64px;left:0;right:0;background:#fff;z-index:99;padding:12px 24px 20px;box-shadow:0 14px 30px rgba(0,0,0,.12);transform:translateY(-115%);transition:.25s}.mobile-menu.open{transform:translateY(0)}.mobile-menu a{display:block;padding:13px 0;border-bottom:1px solid rgba(0,0,0,.07);text-decoration:none;color:var(--text);font-weight:600}
    .hero{padding:68px 0 54px;background:var(--bg)}.hero-grid{display:grid;grid-template-columns:1fr;gap:42px;align-items:center}@media(min-width:900px){.hero-grid{grid-template-columns:1fr 455px}}.hero h1{font-family:Lora,serif;font-size:clamp(34px,5.4vw,60px);line-height:1.08;margin:16px 0}.hero h1 em{color:var(--primary)}.hero p{color:var(--muted);font-size:18px;max-width:640px}.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}.rating{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid rgba(244,162,97,.35);border-radius:999px;padding:7px 14px;margin-top:18px;font-size:13px}.rating .stars{color:var(--gold)}.hero-steps{display:grid;gap:8px;margin-top:18px}.hero-step{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px}.hero-step span{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:rgba(45,106,79,.1);color:var(--primary);font-weight:800}.collage{display:grid;grid-template-columns:1fr 132px;grid-template-rows:160px 160px;gap:14px;position:relative}.photo{background-size:cover;background-position:center;border-radius:16px;box-shadow:0 16px 42px rgba(45,106,79,.16)}.main-photo{grid-row:1/3;background-image:linear-gradient(180deg,rgba(45,106,79,.02),rgba(45,106,79,.18)),url('https://images.pexels.com/photos/3845810/pexels-photo-3845810.jpeg?auto=compress&cs=tinysrgb&w=900')}.top-photo{background-image:url('https://images.pexels.com/photos/3845811/pexels-photo-3845811.jpeg?auto=compress&cs=tinysrgb&w=700')}.bottom-photo{background-image:url('https://images.pexels.com/photos/3845981/pexels-photo-3845981.jpeg?auto=compress&cs=tinysrgb&w=700')}.chip{position:absolute;right:0;top:22px;background:#fff;color:#128c4a;border:1px solid rgba(37,211,102,.3);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:800;box-shadow:0 10px 26px rgba(45,106,79,.14)}
    .voices{background:#fff}.voice-grid{display:grid;grid-template-columns:1fr;gap:16px}@media(min-width:760px){.voice-grid{grid-template-columns:repeat(3,1fr)}}.voice{background:var(--soft);border-left:4px solid var(--accent);border-radius:8px;padding:22px}.voice p{font-family:Lora,serif;font-size:16px;color:var(--text);margin-bottom:12px}.voice small{color:var(--primary);font-weight:700}.about-grid{display:grid;grid-template-columns:1fr;gap:40px;align-items:center}@media(min-width:850px){.about-grid{grid-template-columns:260px 1fr}}.doctor-photo{height:260px;border-radius:18px;background:linear-gradient(180deg,rgba(45,106,79,.04),rgba(45,106,79,.2)),url('https://images.pexels.com/photos/6627531/pexels-photo-6627531.jpeg?auto=compress&cs=tinysrgb&w=700');background-size:cover;background-position:center;box-shadow:0 16px 38px rgba(45,106,79,.14)}.about p{color:var(--muted);margin-bottom:14px;font-size:16px}.badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}.badge{background:var(--soft);color:var(--primary);border:1px solid rgba(45,106,79,.14);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700}.services{background:var(--soft)}.service-grid{display:grid;grid-template-columns:1fr;gap:16px}@media(min-width:650px){.service-grid{grid-template-columns:repeat(2,1fr)}}@media(min-width:980px){.service-grid{grid-template-columns:repeat(3,1fr)}}.service{background:#fff;border-radius:10px;padding:24px;border-top:3px solid var(--primary);box-shadow:0 4px 18px rgba(45,106,79,.06)}.service-icon{width:48px;height:48px;border-radius:12px;background:var(--soft);display:grid;place-items:center;color:var(--primary);font-size:20px;margin-bottom:14px}.service h3{font-family:Lora,serif;font-size:18px;margin-bottom:7px}.service p{color:var(--muted);font-size:14px}.message-grid{display:grid;gap:16px}@media(min-width:760px){.message-grid{grid-template-columns:repeat(3,1fr)}}.message{background:#fff;border:1px solid rgba(45,106,79,.12);border-radius:10px;padding:22px}.message i{width:42px;height:42px;border-radius:12px;background:rgba(37,211,102,.12);color:#128c4a;display:grid;place-items:center;margin-bottom:13px}.message p{color:var(--muted);font-size:14px}.care{background:#fff}.care-grid{display:grid;gap:16px}@media(min-width:760px){.care-grid{grid-template-columns:repeat(2,1fr)}}.care-photo{min-height:260px;border-radius:12px;background-size:cover;background-position:center;position:relative;overflow:hidden}.care-photo:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 42%,rgba(45,106,79,.76))}.care-photo span{position:absolute;left:18px;right:18px;bottom:16px;z-index:1;color:#fff;font-family:Lora,serif;font-weight:700}
    .appointment{background:var(--soft)}.appointment-panel{background:#fff;border-radius:14px;padding:28px;box-shadow:0 14px 36px rgba(45,106,79,.1);display:grid;gap:26px}@media(min-width:850px){.appointment-panel{grid-template-columns:.9fr 1.1fr;padding:36px}}.field{width:100%;min-height:48px;border:1px solid rgba(45,106,79,.22);border-radius:9px;padding:0 12px;font:600 14px Outfit,sans-serif;margin-bottom:14px}.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.slot{border:1px solid rgba(45,106,79,.22);border-radius:9px;background:#fff;color:var(--primary);font-weight:800;min-height:44px}.slot.active{background:var(--primary);color:#fff}.preview{background:var(--soft);border-left:4px solid var(--accent);border-radius:8px;padding:14px;color:var(--muted);font-size:13px;line-height:1.65;margin-bottom:14px}.copy-status{color:var(--primary);font-weight:800;font-size:13px}.contact{background:#fff;border-top:3px solid var(--accent)}.contact-grid{display:grid;gap:34px}@media(min-width:850px){.contact-grid{grid-template-columns:1fr 1fr}}.contact-row{display:flex;gap:14px;margin-bottom:19px}.contact-row i{width:38px;height:38px;background:var(--soft);color:var(--primary);display:grid;place-items:center;border-radius:10px;flex:0 0 38px}.contact-row span{color:var(--muted);font-size:14px}.map{border-radius:12px;overflow:hidden;box-shadow:0 12px 32px rgba(45,106,79,.12)}.map iframe{width:100%;height:360px;border:0;display:block}.footer{background:var(--primary);color:rgba(255,255,255,.72);text-align:center;padding:30px 24px}.footer h3{color:#fff;font-family:Lora,serif}.sticky{position:fixed;bottom:0;left:0;right:0;height:62px;display:flex;z-index:200}@media(min-width:769px){.sticky{display:none}}.sticky a{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;text-decoration:none;font-weight:800}.sticky-wa{background:var(--wa)}.sticky-wa i{width:28px;height:28px;background:#fff;color:#128c4a;border-radius:50%;display:grid;place-items:center}.sticky-call{background:var(--primary)}.wa-bubble{display:none;position:fixed;right:28px;bottom:28px;background:var(--wa);color:#fff;border-radius:999px;padding:12px 18px;text-decoration:none;font-weight:800;box-shadow:0 0 0 0 rgba(37,211,102,.35);animation:pulse 2s infinite}@media(min-width:769px){.wa-bubble{display:flex;gap:9px;align-items:center}}@keyframes pulse{50%{box-shadow:0 0 0 13px rgba(37,211,102,0)}}@media(max-width:520px){.hero-actions .btn{width:100%}.collage{grid-template-columns:1fr 96px;grid-template-rows:130px 130px}.chip{right:-4px;top:10px}.slots{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState}=React;
    const CLINIC="Manav Dental Clinic", WA_NUMBER="", TEL="";
    const services=[
      ["fa-droplet","Scaling and Cleaning","Professional cleaning for tartar, plaque, stains, and gum health."],
      ["fa-tooth","Fillings and Cavities","Tooth-coloured fillings for cavities and small tooth damage."],
      ["fa-teeth","Root Canal Care","Treatment guidance for tooth pain and saving the natural tooth where possible."],
      ["fa-align-center","Braces and Aligners","Alignment options for children, teens, and adults after assessment."],
      ["fa-child-reaching","Children's Dentistry","Calmer dental visits for kids with simple explanations for parents."],
      ["fa-kit-medical","Urgent Dental Concerns","Pain, swelling, broken tooth, or sensitivity can be described before travel."]
    ];
    const voices=[
      ["The doctor explained the treatment first, so the visit felt easier to understand.","Local patient feedback"],
      ["Good for families who want simple advice before deciding on dental work.","Neighborhood patient voice"],
      ["The clinic feels practical, approachable, and helpful for routine dental concerns.","Indore patient voice"]
    ];
    function messageFor(kind,date,slot,concern){return `Hi, I want to contact ${CLINIC}.\n\nPurpose: ${kind}\nPreferred date: ${date}\nPreferred slot: ${slot}\nConcern: ${concern}\nName:\n\nPlease guide me on the next step.`}
    function sendOrCopy(msg,setCopied){if(WA_NUMBER){window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`,"_blank","noopener")}else if(navigator.clipboard){navigator.clipboard.writeText(msg).then(()=>setCopied(true))}else setCopied(true)}
    function Header(){const[open,setOpen]=useState(false);return <><header className="site-header"><div className="container header-inner"><a className="logo" href="#hero"><span className="logo-name">Manav Dental Clinic</span><span className="logo-sub">Indore dental care</span></a><nav className="desktop-nav"><a href="#voices">Patient voices</a><a href="#about">About</a><a href="#services">Treatments</a><a href="#questions">Questions</a><a href="#contact">Contact</a><a className="nav-book" href="#appointment">Plan a Visit</a></nav><button className="hamburger" onClick={()=>setOpen(!open)} aria-label="Open menu"><span/><span/><span/></button></div></header><div className={`mobile-menu ${open?"open":""}`}>{["voices","about","services","questions","appointment","contact"].map(id=><a key={id} href={`#${id}`} onClick={()=>setOpen(false)}>{id==="voices"?"Patient voices":id==="questions"?"Questions welcome":id==="appointment"?"Plan a Visit":id[0].toUpperCase()+id.slice(1)}</a>)}</div></>}
    function Hero(){const[copied,setCopied]=useState(false);const msg=messageFor("Dental question",new Date().toISOString().slice(0,10),"Any suitable time","I want to ask about a dental concern");return <section id="hero" className="hero"><div className="container hero-grid"><div><div className="sec-label">Indore dental clinic</div><h1>Dental care explained clearly, <em>before treatment starts</em></h1><p>For cleaning, cavities, tooth pain, braces, and family dental questions. Ask first, understand the next step, then plan your visit.</p><div className="rating"><span className="stars">★★★★★</span><strong>Daily 10 AM to 10 PM</strong><span>Justdial listing</span></div><div className="hero-actions"><button className="btn btn-primary" onClick={()=>sendOrCopy(msg,setCopied)}><i className="fab fa-whatsapp"/> Ask a Dental Question</button><a className="btn btn-outline" href="#appointment"><i className="fas fa-calendar-check"/> Plan a Visit</a></div>{copied&&<div className="copy-status" style={{marginTop:12}}>Question message copied for WhatsApp.</div>}<div className="hero-steps"><div className="hero-step"><span>1</span> Ask about pain, cleaning, braces, or child dental care</div><div className="hero-step"><span>2</span> Choose a date only when a visit is needed</div><div className="hero-step"><span>3</span> Visit after you understand the next step</div></div></div><div className="collage"><div className="photo main-photo"/><div className="photo top-photo"/><div className="photo bottom-photo"/><div className="chip"><i className="fab fa-whatsapp"/> Questions welcome</div></div></div></section>}
    function Voices(){return <section id="voices" className="section voices"><div className="container"><div className="sec-label">Patient voices</div><h2 className="sec-title">People want clarity before they sit in the chair</h2><div className="accent-rule"/><div className="voice-grid">{voices.map(([t,a])=><div className="voice" key={t}><p>"{t}"</p><small>{a}</small></div>)}</div></div></section>}
    function About(){return <section id="about" className="section about"><div className="container about-grid"><div className="doctor-photo" role="img" aria-label="Dental consultation room"/><div><div className="sec-label">About Manav Dental Clinic</div><h2 className="sec-title">A neighborhood clinic for everyday dental decisions</h2><div className="accent-rule"/><p>Manav Dental Clinic is listed in New Gouri Nagar, Indore. This page is written for patients who may be unsure whether they need cleaning, filling, root canal care, braces advice, or a child dental visit.</p><p>The tone stays practical: explain the concern, understand urgency, then choose the right treatment path.</p><div className="badges"><span className="badge">Daily hours listed</span><span className="badge">Family dental concerns</span><span className="badge">Question first approach</span></div></div></div></section>}
    function Services(){return <section id="services" className="section services"><div className="container"><div className="sec-label">Treatments at Manav</div><h2 className="sec-title">Dental care for common problems</h2><div className="accent-rule"/><div className="service-grid">{services.map(([i,n,d])=><div className="service" key={n}><div className="service-icon"><i className={`fas ${i}`}/></div><h3>{n}</h3><p>{d}</p></div>)}</div></div></section>}
    function Questions(){return <section id="questions" className="section"><div className="container"><div className="sec-label">Questions are welcome</div><h2 className="sec-title">Simple questions can prevent confused visits</h2><div className="accent-rule"/><div className="message-grid"><div className="message"><i className="fas fa-face-grimace"/><h3>Pain or swelling</h3><p>Describe when it started, where it hurts, and whether there is swelling.</p></div><div className="message"><i className="fas fa-child-reaching"/><h3>Child dental visit</h3><p>Share the child's age and concern before planning the visit.</p></div><div className="message"><i className="fas fa-align-center"/><h3>Braces question</h3><p>Ask about spacing, crowding, or alignment before booking an assessment.</p></div></div></div></section>}
    function Care(){const pics=[["A calm checkup before treatment decisions","https://images.pexels.com/photos/3845983/pexels-photo-3845983.jpeg?auto=compress&cs=tinysrgb&w=900"],["Clean instruments and aftercare guidance","https://images.pexels.com/photos/6627656/pexels-photo-6627656.jpeg?auto=compress&cs=tinysrgb&w=900"]];return <section className="section care"><div className="container"><div className="sec-label">Before treatment starts</div><h2 className="sec-title">What patients should understand first</h2><div className="accent-rule"/><div className="care-grid">{pics.map(([l,u])=><div className="care-photo" style={{backgroundImage:`url(${u})`}} key={l}><span>{l}</span></div>)}</div></div></section>}
    function Appointment(){const today=new Date().toISOString().slice(0,10);const[date,setDate]=useState(today),[slot,setSlot]=useState("Evening"),[concern,setConcern]=useState("Dental checkup"),[copied,setCopied]=useState(false);const msg=messageFor("Appointment request",date,slot,concern);return <section id="appointment" className="section appointment"><div className="container appointment-panel"><div><div className="sec-label">Appointment request</div><h2 className="sec-title">Choose a preferred visit slot</h2><p style={{color:"var(--muted)"}}>The planner creates a ready message with your selected date, time, and dental concern.</p></div><div><input className="field" type="date" min={today} value={date} onChange={e=>setDate(e.target.value)}/><div className="slots">{["Morning","Afternoon","Evening"].map(s=><button type="button" className={`slot ${slot===s?"active":""}`} onClick={()=>setSlot(s)} key={s}>{s}</button>)}</div><select className="field" value={concern} onChange={e=>setConcern(e.target.value)}><option>Dental checkup</option><option>Tooth pain</option><option>Cleaning and polishing</option><option>Filling or cavity</option><option>Root canal concern</option><option>Braces or aligners</option><option>Child dental visit</option></select><div className="preview">{msg.split("\n").map((l,i)=><React.Fragment key={i}>{l}<br/></React.Fragment>)}</div><button className="btn btn-primary" onClick={()=>sendOrCopy(msg,setCopied)}><i className="fab fa-whatsapp"/> Prepare WhatsApp Message</button>{copied&&<div className="copy-status" style={{marginTop:10}}>Appointment message copied.</div>}</div></div></section>}
    function Contact(){return <section id="contact" className="section contact"><div className="container contact-grid"><div><div className="sec-label">Contact</div><h2 className="sec-title">Visit Manav Dental Clinic</h2><div className="accent-rule"/><div className="contact-row"><i className="fas fa-location-dot"/><div><strong>New Gouri Nagar, Indore</strong><br/><span>Listed publicly for patients in Indore.</span></div></div><div className="contact-row"><i className="fas fa-clock"/><div><strong>Daily 10:00 AM to 10:00 PM</strong><br/><span>Timing based on public directory listing.</span></div></div><div className="contact-row"><i className="fas fa-message"/><div><strong>Questions before visiting</strong><br/><span>Use the question or appointment message from this page.</span></div></div></div><div className="map"><iframe src="https://maps.google.com/maps?q=New+Gouri+Nagar+Indore&output=embed" title="Manav Dental Clinic map" loading="lazy"/></div></div></section>}
    function App(){return <><Header/><main><Hero/><Voices/><About/><Services/><Questions/><Care/><Appointment/><Contact/></main><footer className="footer"><h3>Manav Dental Clinic</h3><p>Dental care in New Gouri Nagar, Indore.</p></footer><div className="sticky"><a href="#appointment" className="sticky-wa"><i className="fab fa-whatsapp"/> Message</a><a href="#contact" className="sticky-call"><i className="fas fa-map-marker-alt"/> Visit</a></div><a className="wa-bubble" href="#appointment"><i className="fab fa-whatsapp"/> Prepare WhatsApp Message</a></>}
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
