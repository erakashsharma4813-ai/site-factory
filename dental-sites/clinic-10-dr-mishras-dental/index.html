:900;box-shadow:0 10px 26px rgba(23,37,54,.15);font-size:13px}.rating-card{position:absolute;right:-4px;top:22px;background:var(--primary);color:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 14px 30px rgba(23,37,54,.2)}.rating-card strong{display:block;font:900 29px Nunito,sans-serif;line-height:1}.rating-card span{font-size:12px;color:rgba(255,255,255,.78)}@media(max-width:540px){.actions .btn{width:100%}.visual{grid-template-columns:1fr 96px;grid-template-rows:132px 132px}.chip{left:10px;bottom:10px}.rating-card{right:-8px;top:8px}.mobile{top:122px}.topbar-inner{padding:8px 0}}
    .proof{background:var(--primary);color:#fff;padding:26px 0}.proof-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px}@media(min-width:760px){.proof-grid{grid-template-columns:repeat(4,1fr)}}.proof-item{text-align:center;padding:12px;border-right:1px solid rgba(255,255,255,.12)}.proof-item strong{display:block;font:900 28px Nunito,sans-serif}.proof-item span{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.7);font-weight:800}.white{background:#fff}.grid3,.service-grid{display:grid;grid-template-columns:1fr;gap:16px}@media(min-width:760px){.grid3{grid-template-columns:repeat(3,1fr)}}@media(min-width:650px){.service-grid{grid-template-columns:repeat(2,1fr)}}@media(min-width:980px){.service-grid{grid-template-columns:repeat(3,1fr)}}.card,.service{background:#fff;border:1px solid var(--line);border-radius:10px;padding:24px;box-shadow:0 6px 20px rgba(23,37,54,.05)}.voice{background:var(--soft);border-left:4px solid var(--accent);border-radius:8px;padding:22px}.voice p{font-size:15px;margin-bottom:12px}.voice small{font-weight:900;color:var(--accent)}.about-grid{display:grid;grid-template-columns:1fr;gap:40px;align-items:center}@media(min-width:850px){.about-grid{grid-template-columns:270px 1fr}}.doctor-img{height:270px;border-radius:12px;background:linear-gradient(180deg,rgba(23,37,54,.02),rgba(23,37,54,.2)),url('https://images.pexels.com/photos/6627531/pexels-photo-6627531.jpeg?auto=compress&cs=tinysrgb&w=800');background-size:cover;background-position:center;box-shadow:0 16px 38px rgba(23,37,54,.14)}.about p{color:var(--muted);margin-bottom:14px}.badges{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.badge{background:var(--soft);border:1px solid var(--line);border-radius:8px;color:var(--primary);padding:7px 14px;font-size:13px;font-weight:900}.services,.appointment{background:var(--soft)}.icon{width:48px;height:48px;border-radius:10px;background:var(--soft);color:var(--accent);display:grid;place-items:center;font-size:20px;margin-bottom:14px}.service h3,.card h3{font-family:Nunito,sans-serif;font-size:18px;font-weight:900;margin-bottom:7px}.service p,.card p{font-size:14px;color:var(--muted)}.question-panel{background:var(--primary);color:#fff;border-radius:10px;padding:30px;display:grid;gap:24px;align-items:center}@media(min-width:820px){.question-panel{grid-template-columns:1fr auto}}.question-panel p{color:rgba(255,255,255,.76);max-width:700px}.question-panel .btn{background:#fff;color:var(--primary)}.appointment-panel{background:#fff;border-radius:10px;padding:28px;box-shadow:0 16px 40px rgba(23,37,54,.1);display:grid;gap:26px}@media(min-width:850px){.appointment-panel{grid-template-columns:.9fr 1.1fr;padding:36px}}.field{width:100%;min-height:48px;border:1px solid rgba(23,37,54,.22);border-radius:8px;padding:0 12px;font:700 14px "DM Sans",sans-serif;margin-bottom:14px}.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.slot{border:1px solid rgba(23,37,54,.22);border-radius:8px;background:#fff;color:var(--primary);font-weight:900;min-height:44px;cursor:pointer}.slot.active{background:var(--accent);color:#fff;border-color:var(--accent)}.preview{background:var(--soft);border-left:4px solid var(--accent);border-radius:8px;padding:14px;color:var(--muted);font-size:13px;margin-bottom:14px}.contact{background:#fff;border-top:3px solid var(--accent)}.contact-grid{display:grid;gap:34px}@media(min-width:850px){.contact-grid{grid-template-columns:1fr 1fr}}.contact-row{display:flex;gap:14px;margin-bottom:19px}.contact-row i{width:40px;height:40px;background:var(--soft);color:var(--accent);display:grid;place-items:center;border-radius:10px;flex:0 0 40px}.contact-row span{color:var(--muted);font-size:14px}.map{border-radius:10px;overflow:hidden;box-shadow:0 14px 34px rgba(23,37,54,.12)}.map iframe{width:100%;height:370px;border:0;display:block}.footer{background:var(--primary);color:rgba(255,255,255,.72);text-align:center;padding:30px 24px}.footer h3{font-family:Nunito,sans-serif;color:#fff;font-weight:900}.sticky{position:fixed;left:0;right:0;bottom:0;height:64px;display:flex;z-index:200}@media(min-width:769px){.sticky{display:none}}.sticky a{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;text-decoration:none;font-weight:900}.sticky-wa{background:var(--wa)}.sticky-wa i{width:28px;height:28px;background:#fff;color:#128c4a;border-radius:50%;display:grid;place-items:center}.sticky-call{background:var(--primary)}.wa-bubble{display:none;position:fixed;right:28px;bottom:28px;background:var(--wa);color:#fff;border-radius:999px;padding:12px 18px;text-decoration:none;font-weight:900;box-shadow:0 0 0 0 rgba(37,211,102,.35);animation:pulse 2s infinite;z-index:210}@media(min-width:769px){.wa-bubble{display:flex;align-items:center;gap:9px}}@keyframes pulse{50%{box-shadow:0 0 0 13px rgba(37,211,102,0)}}@media(max-width:540px){.slots{grid-template-columns:1fr}}
  </style>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState}=React;
    const CLINIC="Shataayu Dental Clinic", DOCTOR="Dr. Amit Mishra", PHONE="092295-85073", WA_NUMBER="919229585073", TEL="tel:+"+WA_NUMBER, ADDRESS="Kesar Bagh Road, Near Indore Dental, Indore";
    const wa=(msg)=>`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
    const services=[["fa-tooth","Dental Checkups","Routine visits for sensitivity, tooth pain, and family dental concerns."],["fa-droplet","Cleaning and Gum Care","Scaling and polishing for plaque, tartar, stains, and gum support."],["fa-fill-drip","Fillings and Cavities","Tooth repair planning for cavities and small damage."],["fa-teeth","Root Canal Questions","Guidance for deep tooth pain, swelling, and damaged teeth."],["fa-crown","Crowns and Tooth Repair","Restoration options discussed after examination."],["fa-child-reaching","Family Dental Visits","Visit planning for children, adults, and senior family members."]];
    const voices=[
      ["4.8 rating from 214 reviews gives new patients a strong reason to shortlist the clinic.","Public review signal"],
      ["WhatsApp, phone, and appointment request paths are visible without making patients search.","Patient decision path"],
      ["Stable growth candidate with WhatsApp integration.","Local SEO focus"]
    ];
    const before=[
      ["fa-clipboard-check","Concern first","Share pain, sensitivity, swelling, or treatment need before the visit when possible."],
      ["fa-stethoscope","Diagnosis before treatment","Treatment decisions should follow examination and explanation, not guesswork."],
      ["fa-comments","Questions welcome","WhatsApp is set up for simple patient questions and appointment requests."]
    ];
    function Header(){const[open,setOpen]=useState(false);return <><div className="topbar"><div className="container topbar-inner"><span><i className="fas fa-location-dot"/> Kesar Bagh Road</span><a href={TEL}><i className="fas fa-phone"/> {PHONE}</a></div></div><header className="header"><div className="container header-inner"><a className="brand" href="#hero"><span className="mark">SD</span><span><span className="brand-name">{CLINIC}</span><span className="brand-sub">Reliable family dental care</span></span></a><nav className="nav"><a href="#reviews">Reviews</a><a href="#about">Doctor</a><a href="#services">Treatments</a><a href="#appointment">Plan Visit</a><a href="#contact">Contact</a><a className="nav-cta" href="#appointment">Appointment</a></nav><button className="menu" onClick={()=>setOpen(!open)} aria-label="Open menu"><span/><span/><span/></button></div></header><div className={`mobile ${open?"open":""}`}>{["reviews","about","services","questions","appointment","contact"].map(id=><a key={id} href={`#${id}`} onClick={()=>setOpen(false)}>{id==="reviews"?"Reviews":id==="about"?"Doctor":id==="questions"?"Questions":id==="appointment"?"Plan Visit":id[0].toUpperCase()+id.slice(1)}</a>)}</div></>}
    function Hero(){const msg=`Hi, I have a dental question for ${CLINIC}.\n\nMy concern:\nPain or swelling:\nPreferred call back time:\nName:`;return <section id="hero" className="hero"><div className="container hero-grid"><div><div className="eyebrow">Reliable family dental care</div><h1><em>4.8 rated</em> Family dental care with a solid 200+ review base</h1><p>Shataayu Dental Clinic gives patients a simple way to ask questions, call for urgent concerns, and request appointment timing on WhatsApp.</p><div className="proof-pill"><span className="stars"><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/></span><strong>4.8</strong><span>214 reviews</span></div><div className="actions"><a className="btn btn-wa" href={wa(msg)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Ask a Dental Question</a><a className="btn btn-light" href="#appointment"><i className="fas fa-calendar-check"/> Plan a Visit</a><a className="btn btn-primary" href={TEL}><i className="fas fa-phone"/> Call the Clinic</a></div><div className="steps"><div className="step"><span>1</span> WhatsApp simple questions before travelling</div><div className="step"><span>2</span> Call directly for swelling, severe pain, or urgent guidance</div><div className="step"><span>3</span> Visit after the timing and concern are clear</div></div></div><div className="visual"><div className="photo photo-main"/><div className="photo photo-top"/><div className="photo photo-bottom"/><div className="chip"><i className="fab fa-whatsapp"/> Book on WhatsApp</div><div className="rating-card"><strong>4.8</strong><span>214 reviews</span></div></div></div></section>}
    function Proof(){return <div className="proof"><div className="container proof-grid"><div className="proof-item"><strong>4.8</strong><span>Rating</span></div><div className="proof-item"><strong>214</strong><span>Reviews</span></div><div className="proof-item"><strong>MDS</strong><span>Doctor listed</span></div><div className="proof-item"><strong>MDS</strong><span>Doctor context</span></div></div></div>}
    function Reviews(){return <section id="reviews" className="section white"><div className="container"><div className="eyebrow">Review-led confidence</div><h2 className="title">Patients should see the proof early</h2><div className="rule"/><div className="grid3">{voices.map(([t,a])=><div className="voice" key={t}><p>{t}</p><small>{a}</small></div>)}</div></div></section>}
    function About(){return <section id="about" className="section about"><div className="container about-grid"><div className="doctor-img" role="img" aria-label="Dental consultation"/><div><div className="eyebrow">About the doctor</div><h2 className="title">Doctor-led care with clear visit planning</h2><div className="rule"/><p><strong>{DOCTOR}</strong> is listed as MDS.</p><p>Shataayu Dental Clinic is presented as a doctor-led family dental clinic associated with Dr. Amit Mishra, focused on reliable care, clear explanation, and simple appointment requests.</p><p>Consultation fees were not included, so patients are prompted to confirm fees directly before visiting.</p><div className="badges"><span className="badge">Doctor-led clinic</span><span className="badge">WhatsApp questions</span><span className="badge">Call for urgent pain</span><span className="badge">Appointment request flow</span></div></div></div></section>}
    function Services(){return <section id="services" className="section services"><div className="container"><div className="eyebrow">Treatments</div><h2 className="title">Dental care patients can understand before booking</h2><p className="copy">Treatment cards are icon-led and practical, focused on questions patients commonly search before choosing a clinic.</p><div className="rule" style={{marginTop:24}}/><div className="service-grid">{services.map(([i,n,d])=><div className="service" key={n}><div className="icon"><i className={`fas ${i}`}/></div><h3>{n}</h3><p>{d}</p></div>)}</div></div></section>}
    function Questions(){const msg=`Hi ${CLINIC}, I want to ask a dental question before visiting.\n\nConcern:\nAge of patient:\nPain/swelling:\nPreferred call back time:`;return <section id="questions" className="section white"><div className="container question-panel"><div><div className="eyebrow" style={{color:"#bdefff"}}>Questions are welcome</div><h2 className="title" style={{marginBottom:8}}>Ask first if you are unsure about the visit</h2><p>Use WhatsApp for simple questions. Use the phone number for urgent pain, swelling, or if the patient needs same-day direction.</p></div><a className="btn" href={wa(msg)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> WhatsApp the Clinic</a></div></section>}
    function Before(){return <section className="section"><div className="container"><div className="eyebrow">Before treatment starts</div><h2 className="title">A clear first conversation helps patients decide</h2><div className="rule"/><div className="grid3">{before.map(([i,h,p])=><div className="card" key={h}><div className="icon"><i className={`fas ${i}`}/></div><h3>{h}</h3><p>{p}</p></div>)}</div></div></section>}
    function Appointment(){const today=new Date().toISOString().slice(0,10);const[date,setDate]=useState(today),[slot,setSlot]=useState("Evening"),[concern,setConcern]=useState("Dental checkup");const msg=`Hi, I want to request an appointment at ${CLINIC}.\n\nPreferred date: ${date}\nPreferred slot: ${slot}\nConcern: ${concern}\nName:\n\nPlease confirm availability.`;return <section id="appointment" className="section appointment"><div className="container appointment-panel"><div><div className="eyebrow">Appointment request</div><h2 className="title">Book on WhatsApp with a ready message</h2><p className="copy">Choose a preferred date, slot, and concern. WhatsApp opens with the details already filled in.</p></div><div><input className="field" type="date" min={today} value={date} onChange={e=>setDate(e.target.value)}/><div className="slots">{["Morning","Afternoon","Evening"].map(s=><button type="button" className={`slot ${slot===s?"active":""}`} onClick={()=>setSlot(s)} key={s}>{s}</button>)}</div><select className="field" value={concern} onChange={e=>setConcern(e.target.value)}><option>Dental checkup</option><option>Tooth pain</option><option>Cleaning and polishing</option><option>Filling or cavity</option><option>Root canal concern</option><option>Crown or tooth repair</option><option>Child dental visit</option><option>Other dental question</option></select><div className="preview">{msg.split("\n").map((line,i)=><React.Fragment key={i}>{line}<br/></React.Fragment>)}</div><a className="btn btn-wa" href={wa(msg)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Send Appointment Request</a></div></div></section>}
    function Contact(){return <section id="contact" className="section contact"><div className="container contact-grid"><div><div className="eyebrow">Contact</div><h2 className="title">Visit {CLINIC}</h2><div className="rule"/><div className="contact-row"><i className="fas fa-location-dot"/><div><strong>{ADDRESS}</strong><br/><span>Location included for local patients and map searches.</span></div></div><div className="contact-row"><i className="fas fa-phone"/><div><strong><a href={TEL}>{PHONE}</a></strong><br/><span>Call for urgent pain, swelling, or immediate concerns.</span></div></div><div className="contact-row"><i className="fas fa-clock"/><div><strong>Confirm timing before visiting</strong><br/><span>Clinic hours were not included in the provided data, so call or WhatsApp before travelling.</span></div></div><div className="contact-row"><i className="fab fa-whatsapp"/><div><strong><a href={wa(`Hi, I want to contact ${CLINIC}.`)} target="_blank" rel="noopener">WhatsApp the clinic</a></strong><br/><span>Best for simple patient questions and appointment requests.</span></div></div></div><div className="map"><iframe src="https://maps.google.com/maps?q=Shataayu%20Dental%20Clinic%20Kesar%20Bagh%20Road%20Near%20Indore%20Dental%20Indore&output=embed" title="Shataayu Dental Clinic map" loading="lazy"/></div></div></section>}
    function App(){const quick=`Hi, I have a dental question for ${CLINIC}.`;return <><Header/><main><Hero/><Proof/><Reviews/><About/><Services/><Questions/><Before/><Appointment/><Contact/></main><footer className="footer"><h3>{CLINIC}</h3><p>{ADDRESS}</p></footer><div className="sticky"><a className="sticky-wa" href={wa(quick)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> WhatsApp</a><a className="sticky-call" href={TEL}><i className="fas fa-phone"/> Call</a></div><a className="wa-bubble" href={wa(quick)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Ask on WhatsApp</a></>}
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
