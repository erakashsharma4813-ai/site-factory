    function About(){return <section className="section" id="about"><div className="container about-grid"><div className="doctor-media reveal" role="img" aria-label="Dental consultation"/><div className="contact-card reveal"><div className="eyebrow">About the clinic</div><h2 className="section-title">Premium presentation built from verified proof</h2><p className="section-copy">Dr. Aseem Nema leads an established family dental practice. A list of visiting specialists was not included, so the premium page avoids specialist claims and focuses on longevity, review proof, and clear family visit planning.</p></div></div></section>}
    function Services(){return <section className="section section-soft" id="services"><div className="container"><div className="eyebrow">Services</div><h2 className="section-title">Dental care patients can understand before booking</h2><p className="section-copy">The service cards guide patients toward questions, urgent calls, or appointment requests without adding unsupported claims.</p><div className="services-grid">{services.map(([icon,title,copy])=><div className="service-card reveal" key={title}><i className={`fas ${icon}`}/><h3>{title}</h3><p>{copy}</p></div>)}</div></div></section>}
    function ToothServices(){const left=services.slice(0,3),right=services.slice(3);const Point=({item})=>{const[icon,title,copy]=item;return <div className="tooth-point"><div className="tooth-copy"><h3>{title}</h3><p>{copy}</p></div><div className="tooth-icon"><i className={`fas ${icon}`}/></div></div>};return <section className="section tooth-services" id="tooth-services"><div className="container"><div className="eyebrow">Services explained</div><h2 className="section-title">Every visit starts with knowing which tooth problem we are solving</h2><p className="section-copy">The premium service map keeps preventive, urgent, restorative, and family dental concerns visible without repeating photo cards.</p><div className="tooth-map"><div className="tooth-column left">{left.map(item=><Point item={item} key={item[1]}/>)}</div><div className="tooth-center"><div className="tooth-orbit"><i className="fas fa-tooth big-tooth"/><span className="tooth-dot dot-1"/><span className="tooth-dot dot-2"/><span className="tooth-dot dot-3"/><span className="tooth-dot dot-4"/><span className="tooth-dot dot-5"/><span className="tooth-dot dot-6"/><span className="tooth-root"/></div></div><div className="tooth-column right">{right.map(item=><Point item={item} key={item[1]}/>)}</div></div></div></section>}
    function Why(){return <section className="section" id="why"><div className="container"><div className="eyebrow">Why choose this clinic</div><h2 className="section-title">Proof, clarity, and easy next steps</h2><div className="why-grid">{why.map(([icon,title,copy])=><div className="why-card reveal" key={title}><i className={`fas ${icon}`}/><h3>{title}</h3><p>{copy}</p></div>)}</div></div></section>}
    function Gallery(){return <section className="section section-soft" id="gallery"><div className="container"><div className="eyebrow">Clinic experience</div><h2 className="section-title">Polished visuals without unsupported gallery claims</h2><p className="section-copy">Verified interior or social media images were not provided, so this page uses modest dental consultation visuals.</p><div className="gallery-grid">{gallery.map(([label,url])=><div className="gallery-item reveal" style={{backgroundImage:`url(${url})`}} key={label}><span>{label}</span></div>)}</div></div></section>}
    function Testimonials(){return <section className="section" id="testimonials"><div className="container"><div className="eyebrow">Patient signals</div><h2 className="section-title">Review proof without invented reviewer names</h2><div className="test-grid">{reviews.map(([text,label])=><div className="testimonial reveal" key={label}><div className="stars"><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/></div><p>{text}</p><strong>{label}</strong></div>)}</div></div></section>}
    function Appointment(){const today=new Date().toISOString().slice(0,10);const[name,setName]=useState(""),[date,setDate]=useState(today),[slot,setSlot]=useState("6:30 PM"),[service,setService]=useState("Dental checkup"),[note,setNote]=useState("");const message=`Hi, I want to request an appointment at ${CLINIC_NAME}.\n\nName: ${name || ""}\nPreferred date: ${date}\nPreferred slot: ${slot}\nConcern: ${service}\nDetails: ${note || ""}\n\nPlease share the next steps for my visit.`;return <section className="section appointment" id="appointment"><div className="container appointment-grid"><div><div className="eyebrow" style={{color:"#f2c9bd"}}>Book appointment</div><h2 className="section-title">Pick a time and send the request</h2><p className="section-copy">Select a date, time, and concern. The planner creates a ready WhatsApp appointment request.</p></div><div className="form-panel reveal"><input className="field" value={name} onChange={e=>setName(e.target.value)} placeholder="Patient name"/><input className="field" type="date" min={today} value={date} onChange={e=>setDate(e.target.value)}/><div className="slots">{["10:30 AM","1:00 PM","6:30 PM"].map(item=><button className={`slot ${slot===item?"active":""}`} type="button" onClick={()=>setSlot(item)} key={item}>{item}</button>)}</div><select className="field" value={service} onChange={e=>setService(e.target.value)}><option>Dental checkup</option><option>Tooth pain</option><option>Cleaning and polishing</option><option>Filling or cavity</option><option>Root canal concern</option><option>Crown or tooth repair</option><option>Family dental visit</option></select><textarea className="field notes" value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional details"/><div className="message-preview">{message.split("\n").map((line,i)=><React.Fragment key={i}>{line}<br/></React.Fragment>)}</div><a className="btn btn-wa appointment-send" href={waFor(message)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Send Appointment Request</a></div></div></section>}
    function Contact(){return <section className="section" id="contact"><div className="container contact-grid"><div className="contact-card reveal"><div className="eyebrow">Contact</div><h2 className="section-title">Visit {CLINIC_NAME}</h2><p className="section-copy">Call for urgent pain, swelling, or same-day guidance. Social media links were not provided, so no unverified social profile is shown.</p><div className="contact-row"><i className="fas fa-location-dot"/><div><strong>{ADDRESS}</strong><span>Address included for local patients and map searches.</span></div></div><div className="contact-row"><i className="fas fa-phone"/><div><strong><a href={TEL}>{PHONE}</a></strong><span>Call for urgent pain, swelling, or immediate concerns.</span></div></div><div className="contact-row"><i className="fas fa-clock"/><div><strong>Confirm timing before visiting</strong><span>Clinic hours were not included in the provided data.</span></div></div><div className="contact-row"><i className="fas fa-star"/><div><strong>4.9 rating from 700 reviews</strong><span>Public proof used as the premium positioning signal.</span></div></div></div><div className="map-wrap reveal"><iframe src="https://maps.google.com/maps?q=Nema%20Dental%20Clinic%20110%20Jankinagar%20Near%20Navlakha%20Square%20Indore&output=embed" title="Nema Dental Clinic location map" loading="lazy" allowFullScreen /></div></div></section>}
    function StickyActions(){const msg=`Hi, I have a dental question for ${CLINIC_NAME}.`;return <><div className="sticky"><a href={waFor(msg)} className="sticky-wa" target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> WhatsApp</a><a href={TEL} className="sticky-call"><i className="fas fa-phone"/> Call Clinic</a></div><a className="wa-bubble" href={waFor(msg)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Ask on WhatsApp</a></>}
    function App(){useEffect(()=>{const targets=document.querySelectorAll(".section,.quick-card,.service-card,.why-card,.gallery-item,.testimonial,.contact-card,.map-wrap,.form-panel");const io=new IntersectionObserver(entries=>entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add("in-view");io.unobserve(entry.target)}}),{threshold:.12});targets.forEach(el=>io.observe(el));return()=>io.disconnect()},[]);return <><Header/><main><Hero/><QuickCards/><About/><Services/><ToothServices/><Why/><Gallery/><Testimonials/><Appointment/><Contact/></main><footer className="footer"><div className="container"><h3>{CLINIC_NAME}</h3><p>{ADDRESS}</p></div></footer><StickyActions/></>}
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
