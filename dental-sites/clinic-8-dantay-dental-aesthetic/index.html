      const links=[["#about","About"],["#services","Services"],["#why","Why Choose Us"],["#gallery","Gallery"],["#testimonials","Reviews"],["#contact","Contact"]];
      useEffect(()=>{document.body.classList.toggle("menu-open",open);return()=>document.body.classList.remove("menu-open")},[open]);
      return <><div className="top-strip"><div className="container top-inner"><div className="top-items"><span className="top-item"><i className="fas fa-location-dot"/> Bhawar Kuan, Indore</span><span className="top-item"><i className="fas fa-star"/> 4.9 Justdial rating</span><span className="top-item"><i className="fas fa-tooth"/> Dental surgeon care</span></div><a className="top-item" href={TEL}><i className="fas fa-phone"/> {PHONE}</a></div></div><header className="site-header"><div className="container header-inner"><a href="#hero" className="brand"><span className="brand-mark">PA</span><span><span className="brand-name">{CLINIC_NAME}</span><span className="brand-sub">Oral and maxillofacial dental care</span></span></a><nav className="nav">{links.map(([href,label])=><a href={href} key={href}>{label}</a>)}<a href="#appointment" className="btn btn-primary">Book Appointment</a></nav><button className="menu-btn" onClick={()=>setOpen(!open)} aria-label="Open menu"><span/><span/><span/></button></div></header><div className={`mobile-menu ${open?"open":""}`}>{links.map(([href,label])=><a href={href} key={href} onClick={()=>setOpen(false)}>{label}</a>)}<a href="#appointment" onClick={()=>setOpen(false)}>Book Appointment</a></div></>
    }
    function Hero(){
      const msg=`Hi, I have a question for ${CLINIC_NAME}.\n\nI am interested in:\nPreferred visit date:\nName:`;
      return <section className="hero" id="hero"><div className="hero-bg-window"><div className="hero-bg-track">{mediaSlides.map(([label,url])=><div className="hero-bg-slide" style={{backgroundImage:`url(${url})`}} aria-label={label} key={label}/>)}</div></div><div className="container hero-grid"><div className="hero-copy"><div className="hero-kicker">Bhawar Kuan dental surgeon clinic</div><h1>Modern dental and oral surgery consultation near Indrapuri Colony</h1><p>{CLINIC_NAME} is led by {DOCTOR_NAME}, listed on Justdial as an MDS oral and maxillofacial surgery dental surgeon. WhatsApp questions and appointment planning stay one tap away.</p><div className="hero-actions"><a href={waFor(msg)} className="btn btn-wa" target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> WhatsApp a Question</a><a href="#appointment" className="btn btn-primary"><i className="fas fa-calendar-check"/> Book an Appointment</a><a href={TEL} className="btn btn-light"><i className="fas fa-phone"/> Call Clinic</a></div></div><div className="hero-panel"><h3>Before you book</h3><div className="hero-panel-row"><i className="fas fa-star"/><span>4.9 Justdial rating from 24 ratings.</span></div><div className="hero-panel-row"><i className="fas fa-user-doctor"/><span>{DOCTOR_NAME} is listed as BDS, MDS in oral and maxillofacial surgery.</span></div><div className="hero-panel-row"><i className="fas fa-map-marker-alt"/><span>Near Gopal Medical, Indrapuri Colony, Bhawar Kuan.</span></div><a href="#appointment" className="btn btn-primary" style={{width:"100%",marginTop:10}}>Plan Consultation</a></div></div></section>
    }
    function QuickCards(){return <section className="quick-cards"><div className="container quick-grid"><div className="quick-card reveal"><i className="fas fa-star"/><h3>4.9 Justdial rating</h3><p>Strong local proof for new mobile visitors comparing nearby dental surgeon clinics.</p></div><div className="quick-card reveal" style={{"--reveal-delay":"90ms"}}><i className="fas fa-graduation-cap"/><h3>Bhawar Kuan location</h3><p>The clinic is listed near Gopal Medical in Indrapuri Colony, close to the student and coaching hub.</p></div><div className="quick-card reveal" style={{"--reveal-delay":"180ms"}}><i className="fas fa-calendar-check"/><h3>Simple appointment</h3><p>Pick date, exact time, and concern. The page creates a ready WhatsApp request for 9340235008.</p></div></div></section>}
    function About(){return <section className="section" id="about"><div className="container about-grid"><div className="doctor-media reveal" role="img" aria-label="Dental consultation"/><div className="doctor-card reveal"><div className="eyebrow">Doctor-led dental surgeon care</div><h2 className="section-title">Dr. Priyanka Arora, BDS, MDS</h2><p className="section-copy">Justdial lists Dr. Priyanka Arora Dental Surgeon with MDS in oral and maxillofacial surgery and 14 years in healthcare. The page keeps claims factual and focuses on consultation, RCT questions, oral surgery concerns, cosmetic questions, and treatment planning.</p></div></div></section>}
    function Services(){return <section className="section section-soft" id="services"><div className="container"><div className="eyebrow">Services</div><h2 className="section-title">Dental surgeon, aesthetic, and everyday dental questions</h2><p className="section-copy">The service cards guide mobile visitors toward a WhatsApp question or appointment request without inventing a case gallery.</p><div className="services-grid">{services.map(([icon,title,copy],i)=><div className="service-card reveal" style={{"--reveal-delay":`${i*55}ms`}} key={title}><i className={`fas ${icon}`}/><h3>{title}</h3><p>{copy}</p></div>)}</div></div></section>}
    function ToothServices(){
      const Point=({item})=>{const[icon,title,copy]=item;return <div className="tooth-point"><div className="tooth-copy"><h3>{title}</h3><p>{copy}</p></div><div className="tooth-icon"><i className={`fas ${icon}`} aria-hidden="true"/></div></div>};
      return <section className="section tooth-services" id="tooth-services"><div className="container"><div className="eyebrow">Services explained</div><h2 className="section-title">Every treatment starts with knowing which tooth problem we are solving</h2><p className="section-copy">This map keeps cosmetic, preventive, restorative, and family dental concerns visible without repeating photo cards.</p><div className="tooth-map"><div className="tooth-column left">{toothLeft.map(item=><Point item={item} key={item[1]}/>)}</div><div className="tooth-center" aria-hidden="true"><div className="tooth-orbit"><i className="fas fa-tooth big-tooth"/><span className="tooth-dot dot-1"/><span className="tooth-dot dot-2"/><span className="tooth-dot dot-3"/><span className="tooth-dot dot-4"/><span className="tooth-dot dot-5"/><span className="tooth-dot dot-6"/><span className="tooth-root"/></div></div><div className="tooth-column right">{toothRight.map(item=><Point item={item} key={item[1]}/>)}</div></div></div></section>
    }
    function Why(){return <section className="section" id="why"><div className="container"><div className="eyebrow">Why choose this clinic</div><h2 className="section-title">Designed for the way Bhawar Kuan patients decide</h2><p className="section-copy">The site explains choices, keeps contact visible, and avoids unsupported portfolio claims.</p><div className="why-grid">{why.map(([icon,title,copy])=><div className="why-card reveal" key={title}><i className={`fas ${icon}`}/><h3>{title}</h3><p>{copy}</p></div>)}</div></div></section>}
    function Gallery(){return <section className="section section-soft" id="gallery"><div className="container"><div className="eyebrow">Clinic experience</div><h2 className="section-title">Clean, modest visuals until real gallery assets are provided</h2><p className="section-copy">Interior gallery photos were not included. These visuals show the kind of consultation and care environment the site should support.</p><div className="gallery-grid">{gallery.map(([label,url])=><div className="gallery-item reveal" style={{backgroundImage:`url(${url})`}} key={label}><span>{label}</span></div>)}</div></div></section>}
    function Testimonials(){return <section className="section" id="testimonials"><div className="container"><div className="eyebrow">Patient signals</div><h2 className="section-title">Review proof without invented reviewer names</h2><div className="test-grid">{reviews.map(([text,label])=><div className="testimonial reveal" key={label}><div className="stars"><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/><i className="fas fa-star"/></div><p>{text}</p><strong>{label}</strong></div>)}</div></div></section>}
    function Appointment(){
      const today=new Date().toISOString().slice(0,10);
      const[name,setName]=useState(""),[date,setDate]=useState(today),[slot,setSlot]=useState(TIME_SLOTS[2]),[service,setService]=useState("Dental surgeon consultation"),[note,setNote]=useState("");
      const message=`Hi, I want to request an appointment at ${CLINIC_NAME}.\n\nName: ${name || ""}\nPreferred date: ${date}\nPreferred slot: ${slot}\nConcern: ${service}\nDetails: ${note || ""}\n\nPlease share the next steps for my visit.`;
      return <section className="section appointment" id="appointment"><div className="container appointment-grid"><div><div className="eyebrow" style={{color:"#f2c9bd"}}>Book appointment</div><h2 className="section-title">Pick a time and send the request on WhatsApp</h2><p className="section-copy">Select a date, exact time, and concern. The send button opens WhatsApp with a ready appointment request.</p></div><div className="form-panel reveal"><input className="field" value={name} onChange={e=>setName(e.target.value)} placeholder="Patient name"/><input className="field" type="date" min={today} value={date} onChange={e=>setDate(e.target.value)}/><div className="slots">{TIME_SLOTS.map(item=><button className={`slot ${slot===item?"active":""}`} type="button" onClick={()=>setSlot(item)} key={item}>{item}</button>)}</div><select className="field" value={service} onChange={e=>setService(e.target.value)}><option>Dental surgeon consultation</option><option>Oral or maxillofacial concern</option><option>RCT question</option><option>Aesthetic consultation</option><option>Teeth whitening question</option><option>Dental checkup</option><option>Cleaning and polishing</option><option>Tooth pain</option><option>Crown or tooth repair</option></select><textarea className="field notes" value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional details"/><div className="message-preview">{message.split("\n").map((line,i)=><React.Fragment key={i}>{line}<br/></React.Fragment>)}</div><a className="btn btn-wa appointment-send" href={waFor(message)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Send Appointment Request</a></div></div></section>
    }
    function Contact(){return <section className="section" id="contact"><div className="container contact-grid"><div className="contact-card reveal"><div className="eyebrow">Contact</div><h2 className="section-title">Visit {CLINIC_NAME}</h2><p className="section-copy">Use the visit planner to choose a preferred appointment date and concern, WhatsApp 9340235008, or call the clinic directly for urgent pain, swelling, or same-day guidance.</p><div className="contact-row"><i className="fas fa-location-dot"/><div><strong>{ADDRESS}</strong><span>Near Gopal Medical, Indrapuri Colony, Bhawar Kuan.</span></div></div><div className="contact-row"><i className="fas fa-phone"/><div><strong><a href={TEL}>{PHONE}</a></strong><span>Call for urgent pain, swelling, or immediate concerns.</span></div></div><div className="contact-row"><i className="fab fa-whatsapp"/><div><strong><a href={waFor(`Hi, I want to contact ${CLINIC_NAME}.`)} target="_blank" rel="noopener">WhatsApp 9340235008</a></strong><span>Best for appointment requests and simple dental questions.</span></div></div><div className="contact-row"><i className="fas fa-star"/><div><strong><a href={JUSTDIAL_URL} target="_blank" rel="noopener">Justdial listing</a></strong><span>4.9 rating, 24 ratings, consultation fee listed as Rs. 400.</span></div></div><div className="contact-row"><i className="fas fa-clock"/><div><strong>Confirm timing before visiting</strong><span>Justdial lists 14 years in healthcare; confirm current clinic timing before travel.</span></div></div><div className="contact-row"><i className="fas fa-tooth"/><div><strong>Care focus</strong><span>Dental surgeon consultation, RCT questions, oral and maxillofacial concerns, cleaning, checkups, and tooth repair.</span></div></div></div><div className="map-wrap reveal"><iframe src="https://maps.google.com/maps?q=Dr+Priyanka+Arora+Dental+Surgeon+240+Indrapuri+Colony+Infront+Of+Gopal+Medical+Bhawar+Kuan+Indore+452001&output=embed" title="Dr. Priyanka Arora Dental Clinic location map" loading="lazy" allowFullScreen /></div></div></section>}
    function Footer(){return <footer className="footer"><div className="container"><h3>{CLINIC_NAME}</h3><p>{ADDRESS}</p></div></footer>}
    function StickyActions(){const msg=`Hi, I have a question for ${CLINIC_NAME}.`;return <><div className="sticky"><a href={waFor(msg)} className="sticky-wa" target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> WhatsApp</a><a href={TEL} className="sticky-map"><i className="fas fa-phone"/> Call Clinic</a></div><a className="wa-bubble" href={waFor(msg)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Ask on WhatsApp</a></>}
    function App(){
      useEffect(()=>{const targets=document.querySelectorAll(".section,.quick-card,.service-card,.why-card,.gallery-item,.testimonial,.contact-card,.map-wrap,.form-panel");const io=new IntersectionObserver(entries=>entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add("in-view");io.unobserve(entry.target)}}),{threshold:.12});targets.forEach(el=>io.observe(el));return()=>io.disconnect()},[]);
      return <><Header/><main><Hero/><QuickCards/><About/><Services/><ToothServices/><Why/><Gallery/><Testimonials/><Appointment/><Contact/></main><Footer/><StickyActions/></>
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
