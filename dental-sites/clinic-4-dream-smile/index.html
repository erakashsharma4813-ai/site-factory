<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Smile Dental | Lokmanya Nagar, Indore</title>
  <meta name="description" content="Dream Smile Dental. Smile design, whitening, veneers and cosmetic dentistry in Indore. Plan a smile consultation." />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" integrity="sha384-KCD0A3BqTNZfWlXJcL7fKzDri97vicyNr4NUIr0vX6K9PZ0X5hOTeEbFh99jPEST" crossorigin="anonymous"></script>

  <style>
    :root {
      --primary:  #4A1942;
      --accent:   #C89B8C;
      --dark:     #1C1018;
      --dark-2:   #271220;
      --cream:    #FBF7F4;
      --bg:       #FBF7F4;
      --text:     #1C1C1C;
      --text-light: #6A5A63;
      --white:    #FFFFFF;
      --gold:     #E8B84B;
      --wa-green: #25D366;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--text); font-size: 16px; line-height: 1.6; }
    @media (max-width: 768px) { body { padding-bottom: 58px; } }

    .ph { background: rgba(255,165,0,.14); border: 1px dashed rgba(255,165,0,.55); border-radius: 4px; padding: 2px 8px; font-style: italic; opacity: .85; display: inline-block; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border-radius: 0; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 14px; text-decoration: none; min-height: 50px; transition: all .22s ease; white-space: nowrap; cursor: pointer; border: none; letter-spacing: .5px; text-transform: uppercase; }
    .btn-gold { background: var(--accent); color: var(--white); }
    .btn-gold:hover { background: #b5887a; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,155,140,.4); }
    .btn-outline-light { background: transparent; color: var(--cream); border: 1px solid rgba(251,247,244,.3); }
    .btn-outline-light:hover { background: rgba(251,247,244,.1); }
    .btn-outline-dark { background: transparent; color: var(--primary); border: 1px solid rgba(74,25,66,.25); }
    .btn-outline-dark:hover { background: var(--primary); color: var(--cream); }

    /* ── HEADER — light, plum text, over dark hero ── */
    .site-header { position: sticky; top: 0; z-index: 100; background: var(--dark); border-bottom: 1px solid rgba(251,247,244,.06); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { text-decoration: none; display: flex; flex-direction: column; }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--cream); line-height: 1.1; letter-spacing: .3px; }
    .logo-sub  { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); }
    .desktop-nav { display: none; gap: 32px; align-items: center; }
    .desktop-nav a { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 13px; text-transform: uppercase; letter-spacing: .8px; color: rgba(251,247,244,.65); text-decoration: none; transition: color .2s; }
    .desktop-nav a:hover { color: var(--accent); }
    .nav-consult { background: var(--accent) !important; color: var(--white) !important; padding: 8px 20px; font-size: 12px !important; letter-spacing: 1px !important; }
    .nav-consult:hover { background: #b5887a !important; }
    @media (min-width: 769px) { .desktop-nav { display: flex; } }
    .hamburger-btn { display: flex; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; }
    .hamburger-btn span { display: block; width: 22px; height: 2px; background: var(--accent); border-radius: 2px; transition: all .3s; }
    @media (min-width: 769px) { .hamburger-btn { display: none; } }
    .mobile-menu { position: fixed; top: 64px; left: 0; right: 0; background: var(--dark-2); padding: 12px 24px 20px; box-shadow: 0 12px 32px rgba(0,0,0,.3); z-index: 99; transform: translateY(-110%); transition: transform .3s cubic-bezier(.4,0,.2,1); }
    .mobile-menu.open { transform: translateY(0); }
    .mobile-menu a { display: block; padding: 14px 0; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: .5px; color: rgba(251,247,244,.75); text-decoration: none; border-bottom: 1px solid rgba(251,247,244,.06); text-transform: uppercase; font-size: 13px; }
    .mobile-menu a:last-child { border: none; }

    /* ── HERO — dark, aspirational ── */
    .hero-section { background: var(--dark); padding: 72px 24px 80px; min-height: calc(100vh - 64px); display: flex; align-items: center; position: relative; overflow: hidden; }
    .hero-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 70% 50%, rgba(74,25,66,.4) 0%, transparent 65%); pointer-events: none; }
    .hero-inner { max-width: 1100px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr; gap: 40px; align-items: center; position: relative; z-index: 1; }
    @media (min-width: 769px) { .hero-inner { grid-template-columns: 1fr 360px; gap: 60px; } }
    .hero-text { order: 2; }
    .hero-visual { order: 1; display: flex; justify-content: center; }
    @media (min-width: 769px) { .hero-text { order: 1; } .hero-visual { order: 2; justify-content: flex-end; } }
    .hero-eyebrow { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 20px; }
    .hero-h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 6vw, 68px); font-weight: 500; line-height: 1.1; color: var(--cream); margin-bottom: 20px; letter-spacing: -.5px; }
    .hero-h1 em { font-style: italic; color: var(--accent); }
    .hero-sub { font-size: 15px; color: rgba(251,247,244,.55); margin-bottom: 32px; font-weight: 400; line-height: 1.7; }
    .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }

    /* Doctor circle — dark-adapted */
    .doctor-circle-dark { border-radius: 50%; background: linear-gradient(140deg, rgba(74,25,66,.22), rgba(28,16,24,.15)), url('https://images.unsplash.com/photo-1606811971618-4486d14f3f99?auto=format&fit=crop&w=700&q=80'); background-size: cover; background-position: center; border: 2px solid rgba(200,155,140,.4); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 48px rgba(0,0,0,.6), 0 0 0 8px rgba(200,155,140,.06); flex-shrink: 0; animation: photoFloat 5s ease-in-out infinite; }
    @keyframes photoFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .dcd-initials { font-family: 'Cormorant Garamond', serif; font-weight: 600; color: var(--accent); line-height: 1; }
    .dcd-label { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(200,155,140,.6); margin-top: 6px; }

    /* ── ABOUT — light section, editorial ── */
    .about-section { padding: 88px 24px; background: var(--cream); }
    .about-grid { display: grid; grid-template-columns: 1fr; gap: 48px; align-items: start; }
    @media (min-width: 769px) { .about-grid { grid-template-columns: 260px 1fr; gap: 72px; } }
    .about-photo { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .about-photo-circle { border-radius: 50%; background: linear-gradient(140deg, rgba(232,212,228,.25), rgba(212,180,206,.2)), url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?auto=format&fit=crop&w=700&q=80'); background-size: cover; background-position: center; border: 2px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 40px rgba(74,25,66,.12); }
    .about-photo-circle .dc-initials { font-family: 'Cormorant Garamond', serif; font-weight: 600; color: var(--primary); line-height: 1; }
    .about-photo-circle .dc-label { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); margin-top: 4px; }
    .about-credential { text-align: center; }
    .about-credential strong { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--primary); display: block; }
    .about-credential span { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; color: var(--text-light); }
    .about-text .sec-eyebrow { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 12px; }
    .about-text h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 600; color: var(--primary); line-height: 1.15; margin-bottom: 8px; }
    .about-divider { width: 40px; height: 1px; background: var(--accent); margin: 20px 0 28px; }
    .about-text p { font-size: 15px; color: var(--text-light); line-height: 1.85; margin-bottom: 16px; }
    .about-text p strong { color: var(--text); font-weight: 600; }

    /* ── SMILE MENU — editorial service cards ── */
    .services-section { padding: 88px 24px; background: var(--white); }
    .services-header { margin-bottom: 48px; }
    .services-header .sec-eyebrow { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 12px; }
    .services-header h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 600; color: var(--primary); }
    .smile-menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 600px) { .smile-menu-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px) { .smile-menu-grid { grid-template-columns: repeat(3, 1fr); } }
    .smile-card { padding: 28px 24px; border: 1px solid rgba(74,25,66,.1); background: var(--cream); transition: all .25s ease; }
    .smile-card:hover { border-color: var(--accent); box-shadow: 0 8px 32px rgba(200,155,140,.15); transform: translateY(-3px); }
    .svc-line { width: 28px; height: 2px; background: var(--accent); margin-bottom: 18px; }
    .svc-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--primary); margin-bottom: 10px; line-height: 1.2; }
    .svc-desc { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; color: var(--text-light); line-height: 1.65; }

    /* ── BEFORE/AFTER — dark section, placeholder frames ── */
    .transformations-section { padding: 88px 24px; background: var(--dark); }
    .transformations-header { margin-bottom: 48px; }
    .transformations-header .sec-eyebrow { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 12px; }
    .transformations-header h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 500; color: var(--cream); }
    .transformation-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 769px) { .transformation-grid { grid-template-columns: repeat(3, 1fr); } }
    .transform-card { border: 1px solid rgba(200,155,140,.15); overflow: hidden; }
    .transform-label-bar { background: rgba(200,155,140,.1); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .transform-label-bar span { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); }
    .transform-frames { display: grid; grid-template-columns: 1fr 1fr; }
    .transform-frame { height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border: 1px dashed rgba(200,155,140,.15); background: rgba(255,255,255,.02); }
    .transform-frame-label { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; color: rgba(251,247,244,.25); text-transform: uppercase; letter-spacing: 1px; }
    .transform-frame-note { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 9px; color: rgba(251,247,244,.12); font-style: italic; text-align: center; padding: 0 12px; }
    .transform-note { padding: 20px 24px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; color: rgba(251,247,244,.3); font-style: italic; border-top: 1px solid rgba(200,155,140,.1); text-align: center; }

    /* ── TESTIMONIALS — pull quotes ── */
    .testimonials-section { padding: 88px 24px; background: var(--cream); }
    .testimonials-header { margin-bottom: 48px; }
    .testimonials-header .sec-eyebrow { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 12px; }
    .testimonials-header h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 600; color: var(--primary); }
    .pullquote-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
    @media (min-width: 769px) { .pullquote-grid { grid-template-columns: repeat(3, 1fr); gap: 48px; } }
    .pullquote { }
    .pq-mark { font-family: 'Cormorant Garamond', serif; font-size: 72px; line-height: .7; color: var(--accent); display: block; margin-bottom: 14px; opacity: .6; }
    .pq-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(17px, 2.5vw, 21px); font-style: italic; color: var(--text); line-height: 1.6; margin-bottom: 16px; }
    .pq-stars { color: var(--gold); font-size: 12px; margin-bottom: 8px; }
    .pq-author { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; color: var(--text-light); font-weight: 600; letter-spacing: .3px; }

    /* ── CONTACT — dark section ── */
    .contact-section { padding: 88px 24px; background: var(--dark); }
    .contact-header { margin-bottom: 48px; }
    .contact-header .sec-eyebrow { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 12px; }
    .contact-header h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 500; color: var(--cream); }
    .contact-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
    @media (min-width: 769px) { .contact-grid { grid-template-columns: 1fr 1fr; align-items: start; } }
    .contact-detail { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 24px; }
    .c-icon { width: 36px; height: 36px; background: rgba(200,155,140,.1); border: 1px solid rgba(200,155,140,.2); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .c-info { font-size: 14px; color: rgba(251,247,244,.6); line-height: 1.7; }
    .c-info a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .c-info a:hover { text-decoration: underline; }
    .hours-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
    .hours-table td { padding: 6px 0; font-size: 13px; color: rgba(251,247,244,.45); border-bottom: 1px solid rgba(255,255,255,.04); }
    .hours-table td:first-child { font-weight: 600; color: rgba(251,247,244,.7); width: 45%; }
    .contact-ctas { display: flex; flex-direction: column; gap: 12px; margin-top: 28px; }
    .contact-ctas .btn { justify-content: center; }
    .map-wrap { border: 1px solid rgba(200,155,140,.2); overflow: hidden; }
    .map-wrap iframe { display: block; width: 100%; height: 360px; border: 0; filter: grayscale(30%) brightness(0.7); }

    /* Trust photos and appointment request */
    .care-proof-section { padding: 88px 24px; background: var(--cream); }
    .care-proof-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
    @media (min-width: 769px) { .care-proof-grid { grid-template-columns: 1.2fr .8fr; } }
    .care-photo { min-height: 280px; overflow: hidden; position: relative; background-size: cover; background-position: center; filter: saturate(.9); }
    .care-photo::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 35%, rgba(28,16,24,.78)); }
    .care-photo span { position: absolute; left: 20px; right: 20px; bottom: 18px; z-index: 1; color: var(--cream); font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; }
    .care-note { margin-top: 18px; color: var(--text-light); font-size: 13px; line-height: 1.8; }
    .appointment-section { padding: 88px 24px; background: var(--dark); }
    .appointment-panel { display: grid; grid-template-columns: 1fr; gap: 30px; border: 1px solid rgba(200,155,140,.18); padding: 28px; }
    @media (min-width: 769px) { .appointment-panel { grid-template-columns: .9fr 1.1fr; padding: 38px; } }
    .appointment-panel .sec-eyebrow { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 12px; }
    .appointment-panel h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 500; color: var(--cream); line-height: 1.15; margin-bottom: 12px; }
    .appointment-panel p { color: rgba(251,247,244,.55); font-size: 14px; line-height: 1.8; }
    .slot-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .slot-btn { border: 1px solid rgba(200,155,140,.22); background: transparent; color: var(--accent); padding: 11px 8px; font: 600 11px 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; letter-spacing: .8px; cursor: pointer; }
    .slot-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .concern-select { width: 100%; min-height: 48px; border: 1px solid rgba(200,155,140,.22); padding: 0 12px; color: var(--cream); font: 500 13px 'Plus Jakarta Sans', sans-serif; background: var(--dark-2); margin-bottom: 16px; }
    .date-input { width: 100%; min-height: 48px; border: 1px solid rgba(200,155,140,.22); padding: 0 12px; color: var(--cream); font: 600 13px 'Plus Jakarta Sans', sans-serif; background: var(--dark-2); margin-bottom: 16px; color-scheme: dark; }
    .booking-preview { background: rgba(255,255,255,.03); border-left: 2px solid var(--accent); padding: 14px 16px; color: rgba(251,247,244,.55); font-size: 12px; line-height: 1.7; margin-bottom: 16px; }

    /* ── FOOTER — dark ── */
    .site-footer { background: var(--dark-2); border-top: 1px solid rgba(200,155,140,.1); color: rgba(251,247,244,.4); padding: 32px 24px; text-align: center; }
    .footer-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--cream); margin-bottom: 6px; letter-spacing: .3px; }
    .footer-address { font-size: 12px; margin-bottom: 4px; }
    .footer-phone a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 13px; }
    .footer-copy { font-size: 10px; opacity: .4; margin-top: 16px; }

    /* ── STICKY BAR ── */
    .sticky-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; display: flex; height: 58px; }
    @media (min-width: 769px) { .sticky-bar { display: none; } }
    .sticky-bar a { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 13px; text-decoration: none; color: var(--white); text-transform: uppercase; letter-spacing: .5px; }
    .sticky-wa   { background: var(--wa-green); }
    .sticky-call { background: var(--primary); }
    .sticky-wa i { width: 28px; height: 28px; border-radius: 50%; background: #fff; color: #128C4A; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; }

    /* ── WA BUBBLE ── */
    .wa-bubble { position: fixed; bottom: 28px; right: 28px; display: none; align-items: center; gap: 10px; background: var(--wa-green); color: #fff; border-radius: 999px; padding: 12px 18px 12px 14px; box-shadow: 0 4px 24px rgba(37,211,102,.5); z-index: 200; text-decoration: none; transition: transform .2s; animation: waPulse 2.1s infinite; }
    .wa-bubble:hover { transform: translateY(-2px) scale(1.03); animation-play-state: paused; }
    .wa-bubble svg { width: 28px; height: 28px; fill: white; flex: 0 0 auto; }
    .wa-bubble-text { display: flex; flex-direction: column; line-height: 1.15; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .4px; }
    .wa-bubble-text small { font-size: 10px; font-weight: 500; opacity: .85; text-transform: none; letter-spacing: 0; }
    @keyframes waPulse { 0%,100% { box-shadow: 0 4px 24px rgba(37,211,102,.45), 0 0 0 0 rgba(37,211,102,.28); } 50% { box-shadow: 0 4px 24px rgba(37,211,102,.55), 0 0 0 12px rgba(37,211,102,0); } }
    @media (min-width: 769px) { .wa-bubble { display: flex; } }

            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          <span className="wa-bubble-text">Ask privately <small>Smile consultation</small></span>
        </a>
      );
    }

    function App() {
      const [menuOpen, setMenuOpen] = useState(false);
      useEffect(() => {
        function handle(e) {
          const menu = document.querySelector('.mobile-menu');
          const btn  = document.querySelector('.hamburger-btn');
          if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) setMenuOpen(false);
        }
        document.addEventListener('click', handle);
        return () => document.removeEventListener('click', handle);
      }, []);
      return (
        <>
          <Header menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
          <main>
            <Hero />
            <Testimonials />
            <About />
            <Services />
            <Transformations />
            <CareProof />
            <AppointmentRequest />
            <Contact />
          </main>
          <Footer />
          <StickyBar />
          <WhatsAppBubble />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
