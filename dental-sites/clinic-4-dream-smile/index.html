  <style>
    :root {
      --ink: #17202a;
      --muted: #647184;
      --teal: #6f5067;
      --teal-dark: #3f2739;
      --mint: #f5edf2;
      --gold: #d8a84f;
      --rose: #c98f82;
      --paper: #fbfbf8;
      --white: #ffffff;
      --line: #dfe8e6;
      --shadow: 0 22px 60px rgba(74, 25, 66, .13);
      --wa: #25d366;
      --premium: #4A1942;
      --premium-2: #6d275f;
      --premium-soft: #f7eef4;
      --premium-wash: #fbf4f8;
      --premium-accent: #c89b8c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--paper); color: var(--ink); line-height: 1.65; }
    body.menu-open { overflow: hidden; }
    img { max-width: 100%; display: block; }
    a { color: inherit; }
    @media (max-width: 768px) { body { padding-bottom: 66px; } }

    .container { width: min(1180px, calc(100% - 40px)); margin: 0 auto; }
    .section { padding: 92px 0; }
    .section-soft { background: var(--mint); }
    .eyebrow { color: var(--teal); font-size: 12px; font-weight: 800; letter-spacing: 1.8px; text-transform: uppercase; margin-bottom: 12px; }
    .section-title { font-family: "Cormorant Garamond", serif; font-size: clamp(36px, 5vw, 58px); line-height: 1.04; color: var(--ink); margin-bottom: 16px; }
    .section-copy { color: var(--muted); font-size: 16px; max-width: 720px; }
    .reveal { opacity: 0; transform: translateY(34px); transition: opacity .7s ease, transform .7s ease; transition-delay: var(--reveal-delay, 0ms); }
    .reveal.in-view { opacity: 1; transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
    .btn { min-height: 52px; border-radius: 999px; padding: 0 24px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; border: 0; text-decoration: none; font-weight: 800; font-size: 14px; cursor: pointer; transition: transform .22s ease, box-shadow .22s ease, background .22s ease; }
    .btn-primary { background: var(--teal); color: var(--white); box-shadow: 0 14px 32px rgba(74, 25, 66, .22); }
    .btn-primary:hover { transform: translateY(-2px); background: var(--teal-dark); }
    .btn-light { background: var(--white); color: var(--teal-dark); border: 1px solid rgba(74, 25, 66, .16); }
    .btn-light:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .btn-wa { background: var(--wa); color: var(--white); }

    .top-strip { background: var(--teal-dark); color: rgba(255,255,255,.82); font-size: 13px; }
    .top-inner { min-height: 42px; display: flex; justify-content: space-between; align-items: center; gap: 18px; }
    .top-items { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }

    a.top-item { color: rgba(255,255,255,.9); text-decoration: none; font-weight: 800; }
    a.top-item:hover { color: var(--white); }

    .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.96); border-bottom: 1px solid var(--line); backdrop-filter: blur(16px); }
    .header-inner { height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .brand { text-decoration: none; display: flex; align-items: center; gap: 12px; }
    .brand-mark { width: 44px; height: 44px; border-radius: 16px; background: linear-gradient(145deg, var(--teal), var(--rose)); color: var(--white); display: grid; place-items: center; font-weight: 900; }
    .brand-name { display: block; font-size: 17px; font-weight: 900; line-height: 1.1; }

    .menu-btn { border: 0; background: transparent; display: grid; gap: 5px; padding: 10px; cursor: pointer; }
    .menu-btn span { width: 24px; height: 2px; background: var(--ink); border-radius: 2px; }
    .mobile-menu { display: none; position: fixed; top: 118px; left: 0; right: 0; background: var(--white); border-bottom: 1px solid var(--line); box-shadow: var(--shadow); z-index: 99; padding: 16px 24px 24px; }
    .mobile-menu.open { display: block; }
    .mobile-menu a { display: block; padding: 14px 0; text-decoration: none; font-weight: 800; border-bottom: 1px solid var(--line); }
    .mobile-menu a:last-child { border-bottom: 0; color: var(--teal); }
    @media (min-width: 920px) { .nav { display: flex; } .menu-btn { display: none; } }

    .hero { position: relative; min-height: calc(100svh - 118px); color: var(--white); background: var(--teal-dark); display: flex; align-items: center; overflow: hidden; }
    .hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(63,39,57,.96), rgba(63,39,57,.58) 52%, rgba(63,39,57,.34)); z-index: 1; }
    .hero::after { content: ""; position: absolute; inset: auto 0 0 0; height: 130px; background: linear-gradient(0deg, rgba(251,251,248,.96), transparent); opacity: .95; z-index: 2; pointer-events: none; }
    .hero-bg-window { position: absolute; inset: 0; overflow: hidden; }
    .hero-bg-track { display: flex; width: 300%; height: 100%; animation: mediaSlide 18s ease-in-out infinite; }
    .hero-bg-slide { min-width: calc(100% / 3); height: 100%; background-size: cover; background-position: center; animation: kenBurns 10s ease-in-out infinite alternate; }
    .hero-grid { position: relative; z-index: 3; display: grid; grid-template-columns: 1fr; gap: 34px; padding: 78px 0 96px; }
    .hero-copy { max-width: 690px; }

    .hero p { color: rgba(255,255,255,.84); font-size: clamp(17px, 2vw, 21px); max-width: 650px; margin-bottom: 28px; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; }
    .hero-panel { background: rgba(255,255,255,.96); color: var(--ink); border-radius: 8px; padding: 24px; box-shadow: var(--shadow); max-width: 380px; }

    .hero-panel-row { display: flex; gap: 12px; padding: 14px 0; border-top: 1px solid var(--line); color: var(--muted); font-size: 14px; }
    .hero-panel-row:first-of-type { border-top: 0; padding-top: 0; }
    .hero-panel-row i { color: var(--teal); margin-top: 4px; }
    @media (min-width: 980px) { .hero-grid { grid-template-columns: 1fr 390px; align-items: center; } }

    @keyframes mediaSlide {
      0%, 26% { transform: translateX(0); }
      34%, 60% { transform: translateX(-33.3333%); }
      68%, 94% { transform: translateX(-66.6666%); }
      100% { transform: translateX(0); }
    }
    @keyframes kenBurns { from { transform: scale(1); } to { transform: scale(1.08); } }

    .quick-cards { padding-top: 44px; position: relative; z-index: 5; }
    .quick-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
    .quick-card { background: var(--white); border-radius: 8px; padding: 26px; box-shadow: var(--shadow); border: 1px solid rgba(74,25,66,.08); transition: transform .32s ease, box-shadow .32s ease, border-color .32s ease; }
    .quick-card:hover { transform: translateY(-7px); box-shadow: 0 26px 70px rgba(74,25,66,.14); border-color: rgba(200,155,140,.28); }
    .quick-card i { width: 46px; height: 46px; border-radius: 50%; display: grid; place-items: center; background: var(--mint); color: var(--teal); margin-bottom: 14px; }
    .quick-card h3 { font-size: 20px; margin-bottom: 8px; }
    .quick-card p { color: var(--muted); font-size: 14px; }
    @media (min-width: 800px) { .quick-grid { grid-template-columns: repeat(3, 1fr); } }

    .about-grid { display: grid; grid-template-columns: 1fr; gap: 44px; align-items: center; }
    .photo-stack { position: relative; min-height: 460px; }
    .photo-main, .photo-small { position: absolute; background-size: cover; background-position: center; border-radius: 8px; box-shadow: var(--shadow); }
    .photo-main { inset: 0 76px 82px 0; background-image: url("https://images.pexels.com/photos/4269369/pexels-photo-4269369.jpeg?auto=compress&cs=tinysrgb&w=900&v=dream-india-2"); }
    .photo-small { right: 0; bottom: 0; width: 54%; height: 48%; background-image: url("https://images.pexels.com/photos/6627285/pexels-photo-6627285.jpeg?auto=compress&cs=tinysrgb&w=900&v=dream-india-2"); border: 10px solid var(--paper); }
    .experience-badge { position: absolute; left: 22px; bottom: 28px; background: var(--teal); color: var(--white); border-radius: 999px; padding: 16px 20px; font-weight: 900; box-shadow: var(--shadow); }
    .check-list { list-style: none; display: grid; gap: 12px; margin: 24px 0 30px; }
    .check-list li { display: flex; gap: 12px; color: #405064; }

    .service-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 42px; }
    .service-card { background: var(--white); border: 1px solid var(--line); border-radius: 8px; padding: 28px; min-height: 240px; transition: transform .22s ease, box-shadow .22s ease; position: relative; overflow: hidden; }
    .service-card::after { content: "\f5c9"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; right: -16px; bottom: -30px; color: rgba(74,25,66,.055); font-size: 116px; line-height: 1; transform: rotate(-12deg); }
    .service-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
    .service-icon { width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center; background: var(--mint); color: var(--teal); font-size: 23px; margin-bottom: 18px; position: relative; z-index: 1; box-shadow: inset 0 0 0 1px rgba(74,25,66,.08); }
    .service-icon::after { content: ""; position: absolute; inset: -7px; border: 1px dashed rgba(74,25,66,.18); border-radius: 22px; }
    .service-card h3 { font-size: 20px; margin-bottom: 10px; position: relative; z-index: 1; }
    .service-card p { color: var(--muted); font-size: 14px; position: relative; z-index: 1; }
    @media (min-width: 720px) { .service-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1040px) { .service-grid { grid-template-columns: repeat(4, 1fr); } }

    .tooth-services { background: linear-gradient(180deg, var(--premium-wash), #fff); overflow: hidden; }
    .tooth-services .section-title, .tooth-services .section-copy { text-align: center; margin-left: auto; margin-right: auto; }
    .tooth-services .section-title { color: var(--premium); font-family: "Plus Jakarta Sans", sans-serif; font-weight: 900; }
    .tooth-services .eyebrow { text-align: center; color: var(--premium-accent); }
    .tooth-map { display: grid; grid-template-columns: 1fr; gap: 28px; align-items: center; margin-top: 56px; }
    .tooth-column { display: grid; gap: 38px; }
    .tooth-point { display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: center; }
    .tooth-column.right .tooth-point { grid-template-columns: auto 1fr; }
    .tooth-copy { text-align: right; }
    .tooth-column.right .tooth-copy { text-align: left; order: 2; }
    .tooth-icon { width: 54px; height: 54px; border-radius: 16px; background: rgba(255,255,255,.82); border: 1px solid rgba(200,155,140,.35); display: grid; place-items: center; color: var(--premium); font-size: 22px; box-shadow: 0 12px 26px rgba(74,25,66,.08); }
    .tooth-copy h3 { font-size: 19px; color: #6e6470; margin-bottom: 6px; font-weight: 900; }
    .tooth-copy p { color: #6a5265; font-size: 15px; line-height: 1.75; }
    .tooth-center { min-height: 500px; display: grid; place-items: center; position: relative; }
    .tooth-orbit { width: min(520px, 82vw); aspect-ratio: 1; border-radius: 50%; border: 1px solid rgba(74,25,66,.1); display: grid; place-items: center; background: radial-gradient(circle, #fff 0 48%, rgba(255,255,255,.52) 49% 100%); box-shadow: inset 0 0 0 22px rgba(255,255,255,.65), 0 30px 90px rgba(74,25,66,.1); position: relative; }
    .tooth-orbit::before, .tooth-orbit::after { content: ""; position: absolute; border-radius: 50%; pointer-events: none; }
    .tooth-orbit::before { inset: -18px; border: 1px solid rgba(74,25,66,.08); }
    .tooth-orbit::after { inset: 28px; border: 1px solid rgba(200,155,140,.16); }
    .big-tooth { font-size: clamp(220px, 25vw, 330px); color: rgba(255,255,255,.98); text-shadow: 0 26px 58px rgba(74,25,66,.2), -12px -12px 30px rgba(255,255,255,.9); position: relative; z-index: 1; filter: drop-shadow(0 16px 22px rgba(74,25,66,.13)); }
    .tooth-dot { position: absolute; width: 15px; height: 15px; border-radius: 50%; background: var(--premium-accent); box-shadow: 0 0 0 5px rgba(200,155,140,.14); z-index: 2; }
    .dot-1 { left: 18%; top: 22%; } .dot-2 { right: 18%; top: 22%; } .dot-3 { left: 10%; top: 50%; } .dot-4 { right: 10%; top: 50%; } .dot-5 { left: 22%; bottom: 20%; } .dot-6 { right: 22%; bottom: 20%; }
    .tooth-root { position: absolute; width: 62px; height: 38px; border: 1px solid rgba(200,155,140,.28); border-top: 0; border-radius: 0 0 18px 18px; bottom: -44px; left: 50%; transform: translateX(-50%); }
    .tooth-root::after { content: ""; position: absolute; width: 13px; height: 42px; left: 50%; top: -4px; transform: translateX(-50%); border: 1px solid rgba(200,155,140,.28); border-top: 0; border-radius: 0 0 999px 999px; background: rgba(255,255,255,.42); }
    @media (min-width: 1100px) { .tooth-map { grid-template-columns: 1fr 540px 1fr; gap: 58px; } }
    @media (max-width: 768px) {
      .tooth-center { order: -1; min-height: 360px; }
      .tooth-point, .tooth-column.right .tooth-point { grid-template-columns: auto 1fr; }
      .tooth-copy, .tooth-column.right .tooth-copy { text-align: left; order: 2; }
    }

    .why-grid { display: grid; grid-template-columns: 1fr; gap: 22px; margin-top: 42px; }
    .why-card { background: var(--white); border-radius: 8px; padding: 26px; border-left: 4px solid var(--teal); box-shadow: 0 14px 34px rgba(74,25,66,.08); transition: transform .32s ease, box-shadow .32s ease, border-color .32s ease; }
    .why-card:hover { transform: translateY(-7px); box-shadow: 0 26px 70px rgba(74,25,66,.13); border-left-color: var(--premium-accent); }
    .why-card h3 { display: flex; align-items: center; gap: 12px; font-size: 18px; margin-bottom: 8px; }
    .why-card i { color: var(--teal); }

    .gallery-grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-top: 42px; }
    .gallery-item { min-height: 300px; border-radius: 8px; background-size: cover; background-position: center; position: relative; overflow: hidden; transition: transform .32s ease, box-shadow .32s ease; }
    .gallery-item:hover { transform: translateY(-7px); box-shadow: 0 26px 70px rgba(74,25,66,.14); }
    .gallery-item::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 45%, rgba(63,39,57,.82)); }
    .gallery-item span { position: absolute; left: 22px; right: 22px; bottom: 18px; color: var(--white); z-index: 1; font-weight: 900; font-size: 18px; }
    .instagram-note { margin-top: 20px; display: inline-flex; align-items: center; gap: 10px; color: var(--teal-dark); font-weight: 900; text-decoration: none; }
    .instagram-note i { color: #d9477c; font-size: 18px; }
    .instagram-note:hover { color: var(--teal); text-decoration: underline; }
    @media (min-width: 800px) { .gallery-grid { grid-template-columns: 1.2fr .8fr .8fr; } .gallery-item:first-child { min-height: 420px; } }

    .testimonial-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 42px; }
    .testimonial { background: var(--white); border-radius: 8px; padding: 28px; border: 1px solid var(--line); transition: transform .32s ease, box-shadow .32s ease, border-color .32s ease; }
    .testimonial:hover { transform: translateY(-7px); box-shadow: 0 26px 70px rgba(74,25,66,.12); border-color: rgba(200,155,140,.24); }
    .quote-icon { color: var(--gold); font-size: 28px; margin-bottom: 14px; }
    .testimonial p { color: #435267; margin-bottom: 18px; }
    .stars { color: var(--gold); font-size: 13px; margin-bottom: 8px; letter-spacing: 2px; }
    .author { font-weight: 900; color: var(--ink); }
    @media (min-width: 840px) { .testimonial-grid { grid-template-columns: repeat(3, 1fr); } }

    .appointment { background: linear-gradient(135deg, var(--teal-dark), #5f3a55); color: var(--white); }
    .appointment-grid { display: grid; grid-template-columns: 1fr; gap: 36px; align-items: start; }
    .appointment .section-title { color: var(--white); }
    .appointment .section-copy { color: rgba(255,255,255,.76); }
    .form-panel { background: var(--white); color: var(--ink); border-radius: 8px; padding: 28px; box-shadow: var(--shadow); }

    .contact-grid { display: grid; grid-template-columns: 1fr; gap: 30px; margin-top: 42px; }

    @media (min-width: 900px) { .contact-grid { grid-template-columns: .9fr 1.1fr; } }

        targets.forEach((node, index) => {
          node.classList.add("reveal");
          node.style.setProperty("--reveal-delay", `${Math.min(index % 4, 3) * 90}ms`);
        });
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add("in-view");
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.14, rootMargin: "0px 0px -40px 0px" });
        document.querySelectorAll(".reveal").forEach(node => observer.observe(node));
        return () => observer.disconnect();
      }, []);
      return (
        <>
          <Header />
          <main>
            <Hero />
            <QuickCards />
            <About />
            <Services />
            <ToothServices />
            <WhyChoose />
            <Gallery />
            <Testimonials />
            <Appointment />
            <Contact />
          </main>
          <Footer />
          <StickyBar />
          <WhatsAppBubble />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
