<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confident Dental Clinic | Indore Family Dental Care</title>
  <meta name="description" content="Confident Dental Clinic and Implant Centre in Indore. WhatsApp questions, dental appointments, implants, root canal care, braces, cleaning, crowns, bridges, and family dental visits." />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" integrity="sha384-KCD0A3BqTNZfWlXJcL7fKzDri97vicyNr4NUIr0vX6K9PZ0X5hOTeEbFh99jPEST" crossorigin="anonymous"></script>
  <style>
    :root{--primary:#1E3A5F;--accent:#E0724A;--bg:#fffaf6;--soft:#EEF2F7;--text:#1c2530;--muted:#5c6878;--white:#fff;--gold:#E8B84B;--wa:#25D366}
    *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);line-height:1.65}@media(max-width:768px){body{padding-bottom:62px}}.container{max-width:1180px;margin:0 auto;padding:0 24px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;min-height:48px;padding:12px 22px;border-radius:8px;border:0;text-decoration:none;font-family:Nunito,sans-serif;font-weight:900;font-size:15px;cursor:pointer;transition:.2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(224,114,74,.25)}.btn-outline{background:#fff;color:var(--primary);border:2px solid rgba(30,58,95,.36)}.sec-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:800;color:var(--accent);margin-bottom:10px}.sec-title{font-family:Nunito,sans-serif;font-size:clamp(28px,4vw,46px);line-height:1.1;margin-bottom:14px;font-weight:900}.accent-rule{width:50px;height:3px;background:var(--accent);border-radius:8px;margin:0 0 34px}.section{padding:82px 0}.site-header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);border-bottom:1px solid rgba(30,58,95,.12);box-shadow:0 2px 18px rgba(30,58,95,.06)}.header-inner{height:64px;display:flex;align-items:center;justify-content:space-between}.logo{text-decoration:none}.logo-name{display:block;font-family:Nunito,sans-serif;font-size:18px;font-weight:900;color:var(--primary);line-height:1.1}.logo-sub{font-size:10px;text-transform:uppercase;letter-spacing:1.6px;color:var(--muted)}.desktop-nav{display:none;align-items:center;gap:24px}.desktop-nav a{text-decoration:none;color:var(--text);font-size:14px;font-weight:700}.nav-book{background:var(--accent)!important;color:#fff!important;border-radius:8px;padding:8px 16px}.hamburger{display:flex;flex-direction:column;gap:5px;background:none;border:0;padding:8px}.hamburger span{width:23px;height:2px;background:var(--primary);border-radius:2px}@media(min-width:820px){.desktop-nav{display:flex}.hamburger{display:none}}.mobile-menu{position:fixed;top:64px;left:0;right:0;background:#fff;z-index:99;padding:12px 24px 20px;box-shadow:0 14px 30px rgba(0,0,0,.12);transform:translateY(-115%);transition:.25s}.mobile-menu.open{transform:translateY(0)}.mobile-menu a{display:block;padding:13px 0;border-bottom:1px solid rgba(0,0,0,.07);text-decoration:none;color:var(--text);font-weight:700}
    .hero{padding:68px 0 54px;background:var(--bg)}.hero-grid{display:grid;grid-template-columns:1fr;gap:42px;align-items:center}@media(min-width:900px){.hero-grid{grid-template-columns:1fr 455px}}.hero h1{font-family:Nunito,sans-serif;font-size:clamp(34px,5.4vw,60px);line-height:1.05;margin:16px 0;font-weight:900}.hero h1 em{color:var(--primary);font-style:italic}.hero p{color:var(--muted);font-size:18px;max-width:660px}.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}.rating{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid rgba(224,114,74,.32);border-radius:999px;padding:7px 14px;margin-top:18px;font-size:13px}.rating .stars{color:var(--gold)}.hero-steps{display:grid;gap:8px;margin-top:18px}.hero-step{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px}.hero-step span{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:rgba(30,58,95,.09);color:var(--primary);font-weight:900}.collage{display:grid;grid-template-columns:1fr 132px;grid-template-rows:160px 160px;gap:14px;position:relative}.photo{background-size:cover;background-position:center;border-radius:16px;box-shadow:0 16px 42px rgba(30,58,95,.16)}.main-photo{grid-row:1/3;background-image:linear-gradient(180deg,rgba(30,58,95,.02),rgba(30,58,95,.18)),url('https://images.pexels.com/photos/3845757/pexels-photo-3845757.jpeg?auto=compress&cs=tinysrgb&w=900')}.top-photo{background-image:url('https://images.pexels.com/photos/6812540/pexels-photo-6812540.jpeg?auto=compress&cs=tinysrgb&w=700')}.bottom-photo{background-image:url('https://images.pexels.com/photos/3845766/pexels-photo-3845766.jpeg?auto=compress&cs=tinysrgb&w=700')}.chip{position:absolute;right:0;top:22px;background:#fff;color:#128c4a;border:1px solid rgba(37,211,102,.3);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:900;box-shadow:0 10px 26px rgba(30,58,95,.14)}
    .trust-bar{background:var(--primary);color:#fff;padding:24px 0}.trust-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px}@media(min-width:760px){.trust-grid{grid-template-columns:repeat(4,1fr)}}.trust-item{text-align:center;padding:12px;border-right:1px solid rgba(255,255,255,.12)}.trust-item strong{display:block;font-family:Nunito,sans-serif;font-size:26px}.trust-item span{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.65)}.voices{background:#fff}.voice-grid{display:grid;grid-template-columns:1fr;gap:16px}@media(min-width:760px){.voice-grid{grid-template-columns:repeat(3,1fr)}}.voice{background:var(--soft);border-left:4px solid var(--accent);border-radius:8px;padding:22px}.voice p{font-size:15px;color:var(--text);margin-bottom:12px}.voice small{color:var(--primary);font-weight:900}.about-grid{display:grid;grid-template-columns:1fr;gap:40px;align-items:center}@media(min-width:850px){.about-grid{grid-template-columns:260px 1fr}}.doctor-photo{height:260px;border-radius:18px;background:linear-gradient(180deg,rgba(30,58,95,.04),rgba(30,58,95,.2)),url('https://images.pexels.com/photos/3845624/pexels-photo-3845624.jpeg?auto=compress&cs=tinysrgb&w=700');background-size:cover;background-position:center;box-shadow:0 16px 38px rgba(30,58,95,.14)}.about p{color:var(--muted);margin-bottom:14px;font-size:16px}.badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}.badge{background:var(--soft);color:var(--primary);border:1px solid rgba(30,58,95,.14);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:900}.services{background:var(--soft)}.service-grid{display:grid;grid-template-columns:1fr;gap:16px}@media(min-width:650px){.service-grid{grid-template-columns:repeat(2,1fr)}}@media(min-width:980px){.service-grid{grid-template-columns:repeat(3,1fr)}}.service{background:#fff;border-radius:10px;padding:24px;border-top:3px solid var(--primary);box-shadow:0 4px 18px rgba(30,58,95,.06)}.service-icon{width:48px;height:48px;border-radius:12px;background:var(--soft);display:grid;place-items:center;color:var(--primary);font-size:20px;margin-bottom:14px}.service h3{font-family:Nunito,sans-serif;font-size:18px;margin-bottom:7px;font-weight:900}.service p{color:var(--muted);font-size:14px}.why-grid,.message-grid{display:grid;gap:16px}@media(min-width:760px){.why-grid,.message-grid{grid-template-columns:repeat(3,1fr)}}.why,.message{background:#fff;border:1px solid rgba(30,58,95,.1);border-radius:10px;padding:22px}.why i,.message i{width:42px;height:42px;border-radius:12px;background:rgba(224,114,74,.12);color:var(--accent);display:grid;place-items:center;margin-bottom:13px}.why p,.message p{color:var(--muted);font-size:14px}
    .care{background:#fff}.care-grid{display:grid;gap:16px}@media(min-width:760px){.care-grid{grid-template-columns:repeat(3,1fr)}}.care-photo{min-height:230px;border-radius:12px;background-size:cover;background-position:center;position:relative;overflow:hidden}.care-photo:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 42%,rgba(30,58,95,.78))}.care-photo span{position:absolute;left:18px;right:18px;bottom:16px;z-index:1;color:#fff;font-family:Nunito,sans-serif;font-weight:900}.appointment{background:var(--soft)}.appointment-panel{background:#fff;border-radius:14px;padding:28px;box-shadow:0 14px 36px rgba(30,58,95,.1);display:grid;gap:26px}@media(min-width:850px){.appointment-panel{grid-template-columns:.9fr 1.1fr;padding:36px}}.field{width:100%;min-height:48px;border:1px solid rgba(30,58,95,.22);border-radius:9px;padding:0 12px;font:600 14px "DM Sans",sans-serif;margin-bottom:14px}.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.slot{border:1px solid rgba(30,58,95,.22);border-radius:9px;background:#fff;color:var(--primary);font-weight:900;min-height:44px}.slot.active{background:var(--accent);border-color:var(--accent);color:#fff}.preview{background:var(--bg);border-left:4px solid var(--accent);border-radius:8px;padding:14px;color:var(--muted);font-size:13px;line-height:1.65;margin-bottom:14px}.contact{background:#fff;border-top:3px solid var(--accent)}.contact-grid{display:grid;gap:34px}@media(min-width:850px){.contact-grid{grid-template-columns:1fr 1fr}}.contact-row{display:flex;gap:14px;margin-bottom:19px}.contact-row i{width:38px;height:38px;background:var(--soft);color:var(--primary);display:grid;place-items:center;border-radius:10px;flex:0 0 38px}.contact-row span{color:var(--muted);font-size:14px}.map{border-radius:12px;overflow:hidden;box-shadow:0 12px 32px rgba(30,58,95,.12)}.map iframe{width:100%;height:360px;border:0;display:block}.footer{background:var(--primary);color:rgba(255,255,255,.72);text-align:center;padding:30px 24px}.footer h3{color:#fff;font-family:Nunito,sans-serif;font-weight:900}.sticky{position:fixed;bottom:0;left:0;right:0;height:62px;display:flex;z-index:200}@media(min-width:769px){.sticky{display:none}}.sticky a{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;text-decoration:none;font-weight:900}.sticky-wa{background:var(--wa)}.sticky-wa i{width:28px;height:28px;background:#fff;color:#128c4a;border-radius:50%;display:grid;place-items:center}.sticky-call{background:var(--primary)}.wa-bubble{display:none;position:fixed;right:28px;bottom:28px;background:var(--wa);color:#fff;border-radius:999px;padding:12px 18px;text-decoration:none;font-weight:900;box-shadow:0 0 0 0 rgba(37,211,102,.35);animation:pulse 2s infinite}@media(min-width:769px){.wa-bubble{display:flex;gap:9px;align-items:center}}@keyframes pulse{50%{box-shadow:0 0 0 13px rgba(37,211,102,0)}}@media(max-width:520px){.hero-actions .btn{width:100%}.collage{grid-template-columns:1fr 96px;grid-template-rows:130px 130px}.chip{right:-4px;top:10px}.slots{grid-template-columns:1fr}.trust-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState}=React;
    const CLINIC="Confident Dental Clinic", WA_NUMBER="917024619249", TEL="tel:+917024619249", TEL_DISPLAY="+91 70246 19249";
    const services=[
      ["fa-screwdriver-wrench","Dental Implants","Tooth replacement planning for missing teeth, bite support, and long-term function."],
      ["fa-tooth","Root Canal Treatment","Care for painful or damaged teeth with a focus on saving the natural tooth where possible."],
      ["fa-align-center","Braces and Aligners","Alignment options for children, teens, and adults after proper bite assessment."],
      ["fa-crown","Crowns and Bridges","Restoration for damaged or missing teeth with attention to function and appearance."],
      ["fa-droplet","Scaling and Polishing","Professional cleaning to remove plaque, tartar, stains, and support gum health."],
      ["fa-face-smile","Cosmetic Dentistry","Whitening and smile improvements explained before treatment begins."]
    ];
    const voices=[
      ["The clinic explains the treatment clearly before starting. That matters when the whole family visits.","Family patient voice"],
      ["Good for urgent pain questions because the call and WhatsApp options are easy to find.","Indore patient voice"],
      ["The appointment request makes it simple to share the concern before arriving.","Local patient voice"]
    ];
    const why=[
      ["fa-users","Family visit friendly","Services are presented for children, adults, and seniors without making the patient search around."],
      ["fa-shield-heart","Prepared clinical flow","Clean setup, planning, and clear explanation are shown before procedures are discussed."],
      ["fa-calendar-check","Flexible visit planning","Patients can ask a question first or send date, slot, and concern through WhatsApp."],
      ["fa-phone-volume","Call for urgent pain","The phone number is visible for tooth pain, swelling, or immediate dental concerns."],
      ["fa-map-location-dot","Easy city access","Near LIG Square and Singapore Business Park, useful for patients across Indore."],
      ["fa-star","Strong public rating","Public listing shows 4.9 rating from 64 reviews."]
    ];
    function wa(msg){return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`}
    function Header(){const[open,setOpen]=useState(false);return <><header className="site-header"><div className="container header-inner"><a className="logo" href="#hero"><span className="logo-name">Confident Dental Clinic</span><span className="logo-sub">Family dental care. Indore</span></a><nav className="desktop-nav"><a href="#voices">Reviews</a><a href="#about">About</a><a href="#services">Treatments</a><a href="#why">Why us</a><a href="#contact">Contact</a><a className="nav-book" href="#appointment">Book Appointment</a></nav><button className="hamburger" onClick={()=>setOpen(!open)} aria-label="Open menu"><span/><span/><span/></button></div></header><div className={`mobile-menu ${open?"open":""}`}>{["voices","about","services","why","appointment","contact"].map(id=><a key={id} href={`#${id}`} onClick={()=>setOpen(false)}>{id==="voices"?"Reviews":id==="why"?"Why us":id==="appointment"?"Book Appointment":id[0].toUpperCase()+id.slice(1)}</a>)}</div></>}
    function Hero(){const msg=`Hi, I have a dental question for ${CLINIC}.\n\nMy concern:\nPain/swelling if any:\nPreferred call back time:`;return <section id="hero" className="hero"><div className="container hero-grid"><div><div className="sec-label">Indore family dental clinic</div><h1>Dental care for the whole family, <em>explained before treatment</em></h1><p>For implants, root canal care, braces, cleaning, crowns, and urgent dental questions. WhatsApp for simple questions. Call for immediate pain or swelling.</p><div className="rating"><span className="stars">★★★★★</span><strong>4.9</strong><span>64 reviews</span><span>Public listing</span></div><div className="hero-actions"><a className="btn btn-primary" href={wa(msg)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Ask a Dental Question</a><a className="btn btn-outline" href="#appointment"><i className="fas fa-calendar-check"/> Plan a Visit</a></div><div className="hero-steps"><div className="hero-step"><span>1</span> Ask a question by WhatsApp or call</div><div className="hero-step"><span>2</span> Share date, slot, and concern</div><div className="hero-step"><span>3</span> Visit after timing is clear</div></div></div><div className="collage"><div className="photo main-photo"/><div className="photo top-photo"/><div className="photo bottom-photo"/><div className="chip"><i className="fab fa-whatsapp"/> WhatsApp questions welcome</div></div></div></section>}
    function TrustBar(){return <div className="trust-bar"><div className="container trust-grid"><div className="trust-item"><strong>4.9</strong><span>Public rating</span></div><div className="trust-item"><strong>64</strong><span>Reviews</span></div><div className="trust-item"><strong>10:30-9</strong><span>Daily hours</span></div><div className="trust-item"><strong>LIG</strong><span>Indore access</span></div></div></div>}
    function Voices(){return <section id="voices" className="section voices"><div className="container"><div className="sec-label">Patient voices</div><h2 className="sec-title">Families look for clear answers first</h2><div className="accent-rule"/><div className="voice-grid">{voices.map(([t,a])=><div className="voice" key={t}><p>"{t}"</p><small>{a}</small></div>)}</div></div></section>}
    function About(){return <section id="about" className="section about"><div className="container about-grid"><div className="doctor-photo" role="img" aria-label="Family dental consultation"/><div><div className="sec-label">About Confident Dental</div><h2 className="sec-title">A structured family clinic for everyday and advanced dental care</h2><div className="accent-rule"/><p>Confident Dental Clinic and Implant Centre is publicly listed near LIG Square and Singapore Business Park, Indore. The site is built to help patients ask questions, understand options, and request appointments without confusion.</p><p>The design keeps review count, rating, phone, WhatsApp, and appointment planning easy to find because family-clinic patients usually compare clarity, access, and responsiveness.</p><div className="badges"><span className="badge">4.9 public rating</span><span className="badge">Implant centre positioning</span><span className="badge">Call and WhatsApp available</span></div></div></div></section>}
    function Services(){return <section id="services" className="section services"><div className="container"><div className="sec-label">Treatments at Confident</div><h2 className="sec-title">Complete dental care under one roof</h2><div className="accent-rule"/><div className="service-grid">{services.map(([i,n,d])=><div className="service" key={n}><div className="service-icon"><i className={`fas ${i}`}/></div><h3>{n}</h3><p>{d}</p></div>)}</div></div></section>}
    function Why(){return <section id="why" className="section"><div className="container"><div className="sec-label">Why choose us</div><h2 className="sec-title">What helps patients decide before they visit</h2><div className="accent-rule"/><div className="why-grid">{why.map(([i,h,p])=><div className="why" key={h}><i className={`fas ${i}`}/><h3>{h}</h3><p>{p}</p></div>)}</div></div></section>}
    function Questions(){return <section id="questions" className="section services"><div className="container"><div className="sec-label">Questions are welcome</div><h2 className="sec-title">Message first for simple dental doubts</h2><div className="accent-rule"/><div className="message-grid"><div className="message"><i className="fas fa-face-grimace"/><h3>Pain or swelling</h3><p>Call directly for urgent tooth pain, swelling, bleeding, or a broken tooth.</p></div><div className="message"><i className="fas fa-screwdriver-wrench"/><h3>Implant question</h3><p>Ask what details or old X-rays to bring before an implant consultation.</p></div><div className="message"><i className="fas fa-align-center"/><h3>Braces or aligners</h3><p>Share age and alignment concern before booking an orthodontic visit.</p></div></div></div></section>}
    function Care(){const pics=[["Prepared dental chair before treatment","https://images.pexels.com/photos/6812561/pexels-photo-6812561.jpeg?auto=compress&cs=tinysrgb&w=900"],["Dental findings explained clearly","https://images.pexels.com/photos/6627355/pexels-photo-6627355.jpeg?auto=compress&cs=tinysrgb&w=900"],["Clean consultation environment","https://images.pexels.com/photos/3845981/pexels-photo-3845981.jpeg?auto=compress&cs=tinysrgb&w=900"]];return <section className="section care"><div className="container"><div className="sec-label">Before treatment starts</div><h2 className="sec-title">Prepared, explained, then treated</h2><div className="accent-rule"/><div className="care-grid">{pics.map(([l,u])=><div className="care-photo" style={{backgroundImage:`url(${u})`}} key={l}><span>{l}</span></div>)}</div></div></section>}
    function Appointment(){const today=new Date().toISOString().slice(0,10);const[date,setDate]=useState(today),[slot,setSlot]=useState("Evening"),[concern,setConcern]=useState("Dental checkup");const msg=`Hi, I want to request an appointment at ${CLINIC}.\n\nPreferred date: ${date}\nPreferred slot: ${slot}\nConcern: ${concern}\nName:\n\nPlease confirm availability.`;return <section id="appointment" className="section appointment"><div className="container appointment-panel"><div><div className="sec-label">Appointment request</div><h2 className="sec-title">Choose a preferred visit slot</h2><p style={{color:"var(--muted)"}}>The WhatsApp message includes your selected date, slot, and dental concern.</p></div><div><input className="field" type="date" min={today} value={date} onChange={e=>setDate(e.target.value)}/><div className="slots">{["Morning","Afternoon","Evening"].map(s=><button type="button" className={`slot ${slot===s?"active":""}`} onClick={()=>setSlot(s)} key={s}>{s}</button>)}</div><select className="field" value={concern} onChange={e=>setConcern(e.target.value)}><option>Dental checkup</option><option>Tooth pain</option><option>Root canal concern</option><option>Dental implant consultation</option><option>Braces or aligners</option><option>Cleaning and polishing</option><option>Crowns or bridges</option></select><div className="preview">{msg.split("\n").map((l,i)=><React.Fragment key={i}>{l}<br/></React.Fragment>)}</div><a className="btn btn-primary" href={wa(msg)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Send Appointment Request</a></div></div></section>}
    function Contact(){return <section id="contact" className="section contact"><div className="container contact-grid"><div><div className="sec-label">Contact</div><h2 className="sec-title">Visit Confident Dental Clinic</h2><div className="accent-rule"/><div className="contact-row"><i className="fas fa-location-dot"/><div><strong>Near LIG Square, Indore</strong><br/><span>Public listing references Singapore Business Park, Sector C, Indore.</span></div></div><div className="contact-row"><i className="fas fa-phone"/><div><strong><a href={TEL}>{TEL_DISPLAY}</a></strong><br/><span>Call for urgent pain, swelling, or immediate dental concern.</span></div></div><div className="contact-row"><i className="fas fa-clock"/><div><strong>Daily 10:30 AM to 9:00 PM</strong><br/><span>Timing based on public directory listing.</span></div></div></div><div className="map"><iframe src="https://maps.google.com/maps?q=LIG+Square+Singapore+Business+Park+Indore&output=embed" title="Confident Dental Clinic map" loading="lazy"/></div></div></section>}
    function App(){return <><Header/><main><Hero/><TrustBar/><Voices/><About/><Services/><Why/><Questions/><Care/><Appointment/><Contact/></main><footer className="footer"><h3>Confident Dental Clinic</h3><p>Family dental care near LIG Square, Indore.</p></footer><div className="sticky"><a href={wa(`Hi, I have a dental question for ${CLINIC}.`)} className="sticky-wa"><i className="fab fa-whatsapp"/> WhatsApp</a><a href={TEL} className="sticky-call"><i className="fas fa-phone"/> Call</a></div><a className="wa-bubble" href={wa(`Hi, I have a dental question for ${CLINIC}.`)} target="_blank" rel="noopener"><i className="fab fa-whatsapp"/> Ask on WhatsApp</a></>}
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
